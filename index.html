// COMPARISON TAB — added 2026-07-20. Lets the user pick two Weeks (or two Months) and see a
// full side-by-side report matching the "weekly_comparison_jan_19_31_2026.html" sample: a
// Customer Service section, a Supply Chain (Veronica) section, a PayPal Disputes (Maria)
// section — each with a trend arrow per metric — plus an auto-generated Key Observations
// narrative. Reuses aggPP()/aggSC()/aggCS() so the numbers always match the Weekly/Monthly tabs.
// ═══════════════════════════════════════════════════════════
function renderComparison(){
  const list = cmpType==='weekly' ? WEEKS : MONTHS;
  if(!list.length){
    document.getElementById('dash').innerHTML='<div class="no-data">No data loaded yet.</div>';
    return;
  }
  // Default: Period A = the period before the most recent, Period B = the most recent —
  // so the table reads left(older) → right(newer), same as the sample's Week 1 / Week 2.
  // NOTE: <select> values are always strings, but MONTHS' key is numeric — compare as strings
  // throughout so re-selecting a month via the dropdown doesn't silently fail to match.
  if(!cmpKeyA || !list.find(x=>String(x.key)===String(cmpKeyA))) cmpKeyA = String((list[list.length-2]||list[list.length-1]).key);
  if(!cmpKeyB || !list.find(x=>String(x.key)===String(cmpKeyB))) cmpKeyB = String(list[list.length-1].key);

  const typeBtn=(v,lbl)=>`<button onclick="cmpType='${v}';cmpKeyA='';cmpKeyB='';renderComparison()" style="padding:.45rem 1.1rem;font-size:.82rem;font-weight:600;font-family:inherit;cursor:pointer;border:1px solid ${v===cmpType?'#6d28d9':'var(--border)'};border-radius:6px;background:${v===cmpType?'#6d28d9':'#f8fafc'};color:${v===cmpType?'#fff':'var(--muted)'};transition:all .15s">${lbl}</button>`;
  const labelFor=x=>cmpType==='weekly'?`Week of ${x.label}`:x.label;
  const periodOpts=list.map(x=>`<option value="${x.key}">${labelFor(x)}</option>`).join('');

  const controls=`<div style="display:flex;align-items:center;gap:.5rem;margin-bottom:1.25rem;flex-wrap:wrap">
    <div style="font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-right:.4rem">🔀 Comparison View:</div>
    ${typeBtn('weekly','Weekly')}${typeBtn('monthly','Monthly')}
    <select class="pselect" id="cmpSelA" onchange="cmpKeyA=this.value;renderComparison()" style="min-width:220px;font-size:.85rem">${periodOpts}</select>
    <span style="font-weight:800;color:var(--muted);font-size:.8rem">vs</span>
    <select class="pselect" id="cmpSelB" onchange="cmpKeyB=this.value;renderComparison()" style="min-width:220px;font-size:.85rem">${periodOpts}</select>
  </div>`;

  document.getElementById('dash').innerHTML = controls+'<div id="cmpBody"></div>';
  document.getElementById('cmpSelA').value=cmpKeyA;
  document.getElementById('cmpSelB').value=cmpKeyB;

  const pA=list.find(x=>String(x.key)===String(cmpKeyA)), pB=list.find(x=>String(x.key)===String(cmpKeyB));
  const body=document.getElementById('cmpBody');
  if(!pA||!pB){body.innerHTML='<div class="no-data">Select two periods to compare.</div>';return;}
  if(pA.key===pB.key){body.innerHTML='<div class="no-data">Pick two different periods to compare.</div>';return;}
  body.innerHTML=buildComparisonReport(pA,pB,labelFor(pA),labelFor(pB));
}

function buildComparisonReport(pA,pB,labelA,labelB){
  const datesA=pA.dates.slice().sort(sortDK), datesB=pB.dates.slice().sort(sortDK);
  const cs1=aggCS(datesA), cs2=aggCS(datesB);
  const sc1=aggSC(datesA), sc2=aggSC(datesB);
  const pp1=aggPP(datesA), pp2=aggPP(datesB);
  const fmtEur=v=>'€'+(+v||0).toFixed(2);
  const fmtOrders=v=>Math.round(+v||0)+' order'+(Math.round(+v||0)===1?'':'s');
  const fmtInt=v=>Math.round(+v||0).toLocaleString();

  // ── trend arrow: direction is always A(left) → B(right); neutralArrow skips the red/green
  // semantics for metrics where "more" isn't clearly good or bad (matches the sample, which
  // shows Emails Handled in neutral ink while every other metric is colored). ──
  const arrow=(v1,v2,neutralArrow)=>{
    const d=(+v2||0)-(+v1||0);
    if(d===0) return '<span style="color:#94a3b8;font-weight:700">—</span>';
    const up=d>0;
    const color=neutralArrow?'#1e293b':(up?'#dc2626':'#10b981');
    return `<span style="color:${color};font-weight:700;font-size:1rem">${up?'↑':'↓'}</span>`;
  };
  const row=(label,v1,v2,fmt=fmtInt,neutralArrow=false)=>
    `<tr><td class="mn">${label}</td><td class="nc">${fmt(v1)}</td><td class="nc">${fmt(v2)}</td><td class="nc">${arrow(v1,v2,neutralArrow)}</td></tr>`;
  const header=`<tr><th style="min-width:220px">Metric</th><th class="dh">${labelA}</th><th class="dh">${labelB}</th><th class="dh">Trend</th></tr>`;
  const section=(cls,icon,title,sub,rowsHtml)=>`
    <div class="section"><div class="sh ${cls}"><div class="sh-icon ${cls}">${icon}</div><div><div class="sh-ttl">${title}</div>${sub?`<div style="font-size:.68rem;color:var(--muted);font-weight:600">${sub}</div>`:''}</div></div>
    <div class="tbl-wrap"><table class="ctbl"><thead>${header}</thead><tbody>${rowsHtml}</tbody></table></div></div>`;

  const csRows=[
    row('Emails Handled',cs1.emails,cs2.emails,fmtInt,true),
    row('Manual Refunds',cs1.manualRefund,cs2.manualRefund,fmtEur),
    row('PayPal Refunds',cs1.ppRefund,cs2.ppRefund,fmtEur),
    row('Cancellations within 24H',cs1.cancelCount,cs2.cancelCount,fmtOrders),
  ].join('');
  const scRows=[
    row('New Address Issues',sc1.addr,sc2.addr),
    row('New Delivery Issues',sc1.del,sc2.del),
    row('Damaged/Missing (Supplier Approved)',sc1.damA,sc2.damA),
    row('Damaged/Missing (Supplier Declined)',sc1.damD,sc2.damD),
    row('Total New This Period',sc1.totNew,sc2.totNew),
    row('Total Closed This Period',sc1.closed,sc2.closed),
    row('Total Pending',sc1.pending,sc2.pending),
  ].join('');
  const ppRows=[
    row('New Inquiries',pp1.newInq,pp2.newInq),
    row('New Claims',pp1.newClaim,pp2.newClaim),
    row('Escalated (Inquiry → Claim)',pp1.esc,pp2.esc),
    row('Total New Cases',pp1.totNew,pp2.totNew),
    row('Inquiries Won',pp1.inqWin,pp2.inqWin),
    row('Inquiries Lost',pp1.inqLost,pp2.inqLost),
    row('Claims Won',pp1.claimWin,pp2.claimWin),
    row('Claims Lost',pp1.claimLost,pp2.claimLost),
    row('Total Closed Cases',pp1.totClosed,pp2.totClosed),
  ].join('');

  const legend=`<div style="display:flex;gap:1.5rem;padding:.6rem 1rem;background:#f8fafc;border:1px solid var(--border);border-radius:8px;margin-bottom:1.1rem;font-size:.8rem;flex-wrap:wrap">
    <div style="display:flex;align-items:center;gap:.4rem"><span style="color:#dc2626;font-weight:700">↑</span> Increased from ${labelA}</div>
    <div style="display:flex;align-items:center;gap:.4rem"><span style="color:#10b981;font-weight:700">↓</span> Decreased from ${labelA}</div>
    <div style="display:flex;align-items:center;gap:.4rem"><span style="color:#94a3b8;font-weight:700">—</span> No change</div>
  </div>`;

  // ── Key Observations — auto-generated narrative, same role as the sample's highlight boxes ──
  const chg=(a,b)=>{a=+a||0;b=+b||0;const diff=b-a;const pct=a!==0?Math.round(Math.abs(diff)/a*1000)/10:(b!==0?100:0);return{diff,pct,dir:diff>0?'increased':diff<0?'decreased':'stayed flat'};};
  const phrase=(label,a,b,fmt=v=>v)=>{const c=chg(a,b);if(c.diff===0)return`${label} stayed flat at ${fmt(a)}`;return`${label} ${c.dir} from ${fmt(a)} to ${fmt(b)} (${c.dir==='increased'?'↑':'↓'}${c.pct}%)`;};
  const obsBox=(title,text)=>`<div style="background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:1rem;margin-bottom:.75rem">
    <div style="font-weight:800;color:var(--text);margin-bottom:.4rem;font-size:.85rem">${title}</div>
    <div style="font-size:.83rem;color:#475569;line-height:1.65">${text}</div>
  </div>`;

  const csObs=[
    phrase('Emails handled',cs1.emails,cs2.emails,fmtInt),
    phrase('Manual refunds',cs1.manualRefund,cs2.manualRefund,fmtEur),
    phrase('PayPal refunds',cs1.ppRefund,cs2.ppRefund,fmtEur),
    phrase('Cancellations within 24 hours',cs1.cancelCount,cs2.cancelCount,fmtOrders),
  ].join('. ')+'.';
  const scObs=[
    phrase('Address issues',sc1.addr,sc2.addr,fmtInt),
    phrase('Delivery issues',sc1.del,sc2.del,fmtInt),
    phrase('Total cases closed',sc1.closed,sc2.closed,fmtInt),
    phrase('Pending cases',sc1.pending,sc2.pending,fmtInt),
  ].join('. ')+'.';
  const ppObs=[
    phrase('New claims',pp1.newClaim,pp2.newClaim,fmtInt),
    phrase('Escalations',pp1.esc,pp2.esc,fmtInt),
    phrase('Claims lost',pp1.claimLost,pp2.claimLost,fmtInt),
    phrase('Total new cases',pp1.totNew,pp2.totNew,fmtInt),
  ].join('. ')+'.';

  return `
    <div style="background:#f5f3ff;border:1px solid #c4b5fd;border-radius:8px;padding:.75rem 1rem;margin-bottom:1rem">
      🔀 <strong style="color:#4c1d95">${labelA}</strong> vs <strong style="color:#4c1d95">${labelB}</strong>
    </div>
    ${legend}
    ${section('cs-s','📧','Customer Service','King · Patrick · Gabby',csRows)}
    ${section('sc-s','📦','Supply Chain Management','Veronica',scRows)}
    ${section('pp-s','⚖️','PayPal Dispute Management','Maria',ppRows)}
    <div class="section">
      <div class="sh"><div class="sh-icon" style="background:#f1f5f9">🔎</div><div class="sh-ttl">Key Observations</div></div>
      ${obsBox('Customer Service',csObs)}
      ${obsBox('Supply Chain Management',scObs)}
      ${obsBox('PayPal Dispute Management',ppObs)}
    </div>`;
}

// Each shift-slot cell is one of four states:
//   'on'    — cell has the rep's name only → colored, they're working that slot
//   'admin' — cell has the rep's name PLUS an "admin" marker (e.g. "King - admin", spotted
//             2026-07-14) → amber, they're doing admin/non-production work that slot, not off
//   'off'   — cell has the rep's name PLUS an "OFF" marker (e.g. "King - OFF") → grey, scheduled but off
//   'blank' — cell is empty → not part of their schedule at all
// Cell background color from the Google Sheet can't be read through the gviz/tq CSV feed (it only

const SCHEDULE_REPS=[

function scheduleCellState(cellText){
  const v=(cellText||'').trim();
  if(!v) return 'blank';
  if(/off/i.test(v)) return 'off';
  if(/admin/i.test(v)) return 'admin';
  return 'on';
}
function renderSchedule(dk){

    const cells=(SCORE_COLS.sched||[]).map(ci=>{

      if(st==='admin') return `<td style="padding:.35rem;border:1px solid #e8edf2;text-align:center"><div title="Admin / non-production work" style="background:#d97706;color:#fff;border-radius:5px;padding:.45rem .2rem;font-size:.55rem;font-weight:800;letter-spacing:.03em">ADMIN</div></td>`;
      if(st==='off')   return `<td style="padding:.35rem;border:1px solid #e8edf2;text-align:center"><div title="Scheduled — Off" style="background:#94a3b8;color:#fff;border-radius:5px;padding:.45rem .2rem;font-size:.58rem;font-weight:800;letter-spacing:.04em">OFF</div></td>`;

      ${cells}

  const html=`

        <div style="font-size:.92rem;font-weight:700;color:#1e293b;margin-top:.15rem">${dk2full(dk)}</div>
      </div>
      <div style="display:flex;gap:1.1rem;flex-wrap:wrap;font-size:.7rem;font-weight:600;color:#475569">
        <span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:#2563eb;vertical-align:-1px;margin-right:.3rem"></span>Working (set schedule)</span>
        <span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:#d97706;vertical-align:-1px;margin-right:.3rem"></span>Admin / non-production</span>
        <span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:#94a3b8;vertical-align:-1px;margin-right:.3rem"></span>Scheduled — Off</span>
        <span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:#f1f5f9;border:1px solid #e2e8f0;vertical-align:-1px;margin-right:.3rem"></span>Not scheduled</span>
      </div>
    </div>
    <div style="overflow-x:auto">
    <table style="width:100%;border-collapse:collapse;font-size:.78rem">
      <thead><tr>
        <th style="padding:.5rem .7rem;background:#f1f5f9;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#64748b;text-align:left;border:1px solid #e2e8f0;min-width:110px">Team Member</th>
        ${SCHEDULE_SLOT_LABELS.map(l=>`<th style="padding:.5rem .4rem;background:#f1f5f9;font-size:.6rem;font-weight:700;color:#64748b;text-align:center;border:1px solid #e2e8f0;white-space:nowrap">${l.replace(' / ','<br>')}</th>`).join('')}

      in the cell (e.g. "King - OFF", "King - admin") — cell background color can't be read through
      the live data feed, so type "OFF" or "admin" next to a name to mark a slot as off or

  document.getElementById('dash').innerHTML=html;
}

let _scView='weekly';
function renderScorecard(view){
  _scView=view||'monthly';

  const LVL_BG  =[null,'#fef3c7','#ecfccb','#dcfce7'];
  const LVL_CLR =['#94a3b8','#d97706','#65a30d','#15803d'];
  const LVL_LBL =['No Data','Below Target','Meeting Target','Exceeding Target'];
  const LVL_ICON=['⬜','🟠','🟡','🟢'];
  const CS_AWARD=['—','$50','$75','$100'];
  const csLevel=(pct,q)=>{if(pct==null||q==null)return 0;if(pct>100&&q>=100)return 3;if(pct>=96&&q>=95)return 2;if(pct>=90&&q>=90)return 1;return 0;};
  const mariaQualLevel=q=>{if(q==null)return 0;if(q>=91)return 3;if(q>=85)return 2;return 1;};
  const veronicaQualLevel=q=>{if(q==null)return 0;if(q>=95)return 3;if(q>=90)return 2;return 1;};
  const pctColor=p=>p==null?'#94a3b8':p>=100?'#15803d':p>=96?'#65a30d':p>=90?'#d97706':'#dc2626';
  const qColor=q=>q==null?'#94a3b8':q>=100?'#15803d':q>=95?'#65a30d':q>=90?'#d97706':'#dc2626';
  const badge=(text,bg,color)=>`<span style="display:inline-block;padding:.2rem .55rem;border-radius:20px;font-size:.7rem;font-weight:700;background:${bg};color:${color}">${text}</span>`;

  // ── Month-relative week labeling: "June 29 — Week 1" where the number RESETS each month ──
  // A week is "owned" by whichever month has the majority of its data-dates (handles weeks that
  // straddle a month boundary, e.g. a week with 2 June days + 5 July days is owned by July).
  // Number = 1-based position among that month's owned weeks, sorted chronologically.
  const _scWeekOwnerMo=(wkObj)=>{
    const counts={};
    (wkObj.dates||[]).forEach(dk=>{const mo=+dk.split('-')[0];counts[mo]=(counts[mo]||0)+1;});
    let ownerMo=null,max=-1;
    Object.keys(counts).forEach(mo=>{if(counts[mo]>max){max=counts[mo];ownerMo=+mo;}});
    if(ownerMo===null) ownerMo=+(wkObj.key||'0-0').split('-')[0];
    return ownerMo;
  };
  const scWeekOwnerAndNum=(wKey)=>{
    const wkObj=WEEKS.find(w=>w.key===wKey);
    if(!wkObj) return{mo:null,num:'?'};
    const ownerMo=_scWeekOwnerMo(wkObj);
    const siblings=WEEKS.filter(w=>_scWeekOwnerMo(w)===ownerMo).sort((a,b)=>sortDK(a.key,b.key));
    const num=siblings.findIndex(w=>w.key===wKey)+1;
    return{mo:ownerMo,num:num>0?num:'?'};
  };
  const scWeekLabel=(wKey)=>{
    const parts=(wKey||'').split('-').map(Number);
    const mo=parts[0],day=parts[1];
    return `${MN[mo]||''} ${day||''} — Week ${scWeekOwnerAndNum(wKey).num}`;
  };
  const scWeekShort=(wKey)=>{
    const parts=(wKey||'').split('-').map(Number);
    const mo=parts[0],day=parts[1];
    return `${MS[mo]||''} ${day||''}<br><span style="font-size:.55rem;color:#94a3b8;font-weight:700">Week ${scWeekOwnerAndNum(wKey).num}</span>`;
  };

  // ── Rep weekly aggregate from DB.score directly (works for any week object, not just the UI-selected one) ──
  const wkAggDB=(name,wkObj)=>{
    // wkObj.key is already the Monday date (monKey) by construction — use it directly so this
    // works even for placeholder weeks with an empty dates[] array (no data yet).
    const mon=dk2date(wkObj.key),sun=new Date(mon.getTime()+6*86400000);
    const lo=name.toLowerCase();let e=0,t=0,h=0,ah=0,q=[];
    DB.score.forEach(r=>{
      if(!(r[SCORE_COLS.name]||'').toLowerCase().includes(lo))return;
      const rdk=anyDateKey(r[SCORE_COLS.date])||scoreDateKey(r[SCORE_COLS.date]);if(!rdk)return;
      const rd=dk2date(rdk);if(rd<mon||rd>sun)return;
      if(name==='Veronica'&&rd.getDay()===0)return;
      const gv=c=>{if(c===undefined||c<0)return null;const v=(r[c]||'').trim();return(v===''||v.startsWith('#'))?null:v;};
      const ev=gv(SCORE_COLS.emails),tv=gv(SCORE_COLS.target),hv=gv(SCORE_COLS.hours),qv=gv(SCORE_COLS.quality),ahv=gv(SCORE_COLS.adminHours);
      if(ev===null&&hv===null)return;
      if(ev!==null)e+=parseFloat(ev)||0;if(tv!==null)t+=parseFloat(tv)||0;
      if(hv!==null)h+=parseFloat(hv)||0;if(qv!==null)q.push(parseFloat(qv));
      if(ahv!==null)ah+=parseFloat(ahv)||0;
    });
    if(!e&&!h&&!q.length)return null;
    return{emails:e,target:t,pct:t>0?+((e/t)*100).toFixed(1):null,hours:+h.toFixed(1),quality:q.length?+(q.reduce((a,b)=>a+b,0)/q.length).toFixed(1):null,adminHours:+ah.toFixed(1)};
  };

  // ── Reusable incentive-panel row/card builders (shared by Weekly + Monthly views) ──
  const _ir=(lbl,val,note,clr)=>`<div style="display:flex;justify-content:space-between;align-items:flex-start;padding:.28rem 0;border-bottom:1px dashed #f1f5f9;gap:.5rem"><div style="flex:1;min-width:0"><div style="font-size:.73rem;font-weight:600;color:#374151">${lbl}</div>${note?`<div style="font-size:.57rem;color:#94a3b8;margin-top:.02rem;line-height:1.3">${note}</div>`:''}</div><div style="font-size:.79rem;font-weight:800;color:${clr||'#1e293b'};white-space:nowrap;padding-left:.4rem">${val}</div></div>`;
  const _ic=(bdr,bg,title,body,total,totalLbl)=>`<div style="background:#fff;border:1px solid ${bdr};border-radius:8px;overflow:hidden"><div style="background:${bg};padding:.5rem .8rem;border-bottom:1px solid ${bdr}"><div style="font-size:.57rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:${bdr}">${title}</div></div><div style="padding:.6rem .8rem">${body}<div style="margin-top:.5rem;padding-top:.45rem;border-top:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center"><span style="font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#64748b">${totalLbl||'Total Estimated Incentive'}</span><span style="font-size:1.05rem;font-weight:800;color:${total>0?'#15803d':'#94a3b8'}">$${total.toFixed(2)}</span></div></div></div>`;

  // ── Jewel's incentive for one week (Mon–Sun), computed from real audit/score/PP data ──
  // Rules: $0.50 per PayPal case Maria wins (resolution-date basis) · $5 per team member/week who
  // hits "Meeting Target" or better on their existing Level · $10/week only if Jewel logged ≥5 quality
  // audit sessions for EACH of the 5 team members that week.
  const JEWEL_AUDIT_PARAMS={
    King:    [DB.auditKing,    1,2],
    Patrick: [DB.auditPatrick, 1,2],
    Gabby:   [DB.auditGabby,   1,2],
    Veronica:[DB.auditVeronica,1,2],
    Maria:   [DB.auditMaria,  -1,1],
  };
  const jewelWeekCalc=(wkObj)=>{
    if(!wkObj||!wkObj.dates||!wkObj.dates.length) return null;
    const wdates=wkObj.dates;
    const members=[
      {name:'King',    kind:'cs'},
      {name:'Patrick', kind:'cs'},
      {name:'Gabby',   kind:'cs'},
      {name:'Veronica',kind:'sc'},
      {name:'Maria',   kind:'pp'},
    ];
    const teamMet=members.map(m=>{
      const agg=wkAggDB(m.name,wkObj);
      let lvl=0;
      if(agg){
        if(m.kind==='cs') lvl=csLevel(agg.pct,agg.quality);
        else if(m.kind==='sc') lvl=veronicaQualLevel(agg.quality);
        else lvl=mariaQualLevel(agg.quality);
      }
      return{name:m.name,lvl,met:lvl>=2};
    });
    const teamMetCount=teamMet.filter(t=>t.met).length;
    const teamBonus=teamMetCount*5;
    const auditCounts=members.map(m=>{
      const[arr,countCI,rateCI]=JEWEL_AUDIT_PARAMS[m.name];
      const cnt=wdates.reduce((s,dk)=>s+auditData(arr||[],dk,countCI,rateCI).count,0);
      return{name:m.name,count:cnt,met:cnt>=5};
    });
    const ownMet=auditCounts.every(a=>a.met);
    const ownBonus=ownMet?10:0;
    const _yr=new Date().getFullYear();
    const ppWins=calcPPDisputes(wdates,_yr).wonByResolved;
    const ppBonus=+(ppWins*0.5).toFixed(2);
    const total=+(teamBonus+ownBonus+ppBonus).toFixed(2);
    return{teamMet,teamMetCount,teamBonus,auditCounts,ownMet,ownBonus,ppWins,ppBonus,total};
  };

  const subTabs=['weekly','monthly'].map(v=>`
    <button onclick="renderScorecard('${v}')" style="padding:.45rem 1.1rem;font-size:.82rem;font-weight:600;font-family:inherit;cursor:pointer;border:1px solid ${v===_scView?'#7c3aed':'var(--border)'};border-radius:6px;background:${v===_scView?'#7c3aed':'#f8fafc'};color:${v===_scView?'#fff':'var(--muted)'};transition:all .15s">${v.charAt(0).toUpperCase()+v.slice(1)}</button>`).join('');

  let html=`<div style="display:flex;align-items:center;gap:.5rem;margin-bottom:1.25rem;flex-wrap:wrap">
    <div style="font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-right:.4rem">📊 Scorecard View:</div>
    ${subTabs}
  </div>`;

  // Helper: get one rep's scorecard row for a date
  const getDay=(name,dk)=>{
    if(!dk)return null;
    const lo=name.toLowerCase();
    const row=DB.score.find(r=>(anyDateKey(r[SCORE_COLS.date])||scoreDateKey(r[SCORE_COLS.date]))===dk&&(r[SCORE_COLS.name]||'').toLowerCase().includes(lo));
    if(!row)return null;
    const gv=col=>{if(col===undefined||col<0)return null;const v=(row[col]||'').trim();return(v===''||v.startsWith('#'))?null:v;};
    return{emails:gv(SCORE_COLS.emails),target:gv(SCORE_COLS.target),pct:gv(SCORE_COLS.pct),hours:gv(SCORE_COLS.hours),quality:gv(SCORE_COLS.quality),adminHours:gv(SCORE_COLS.adminHours)};
  };

  // Table header cell styles
  const TH=`style="padding:.4rem .5rem;background:#f1f5f9;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#64748b;text-align:center;border:1px solid #e2e8f0;white-space:nowrap"`;
  const TH_REP=`style="padding:.4rem .6rem;background:#f1f5f9;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#64748b;text-align:left;border:1px solid #e2e8f0;min-width:90px"`;

  // Day cell for CS (% primary, emails secondary)
  const csCell=d=>{
    if(!d||d.emails==null)return`<td style="padding:.4rem .35rem;border:1px solid #e8edf2;text-align:center;background:#f8fafc"><span style="color:#cbd5e1;font-size:.7rem">—</span></td>`;
    const p=parseFloat(d.pct||0);
    const bg=p>=96?'#f0fdf4':p>=90?'#fefce8':p>0?'#fff1f2':'#f8fafc';
    const clr=p>=96?'#15803d':p>=90?'#92400e':'#b91c1c';
    return`<td style="padding:.4rem .35rem;border:1px solid #e8edf2;text-align:center;background:${bg}"><div style="font-size:.9rem;font-weight:800;color:${clr};line-height:1">${d.pct||'?'}%</div><div style="font-size:.56rem;color:#64748b;margin-top:.1rem">${d.emails} hdld</div></td>`;
  };

  // Day cell for Maria/Veronica (cases + quality)
  const ppCell=d=>{
    if(!d||d.emails==null)return`<td style="padding:.4rem .35rem;border:1px solid #e8edf2;text-align:center;background:#f8fafc"><span style="color:#cbd5e1;font-size:.7rem">—</span></td>`;
    const q=parseFloat(d.quality||0);
    const bg=q>=95?'#f0fdf4':q>=90?'#fefce8':q>0?'#fff1f2':'#f8fafc';
    return`<td style="padding:.4rem .35rem;border:1px solid #e8edf2;text-align:center;background:${bg}"><div style="font-size:.8rem;font-weight:700;color:#1e293b;line-height:1">${d.emails}</div><div style="font-size:.58rem;font-weight:600;color:${qColor(q>0?q:null)};margin-top:.1rem">${d.quality||'?'}%</div></td>`;
  };

  const lvlBadge=(lvl)=>`<span style="display:inline-block;padding:.15rem .45rem;border-radius:20px;font-size:.65rem;font-weight:700;white-space:nowrap;background:${lvl>0?LVL_BG[lvl]:'#f1f5f9'};color:${LVL_CLR[lvl]}">${LVL_ICON[lvl]} ${LVL_LBL[lvl]}</span>`;
  const sectionLbl=(txt,c,bg)=>`<div style="font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:${c};padding:.25rem .7rem;background:${bg};border-left:3px solid ${c};border-radius:3px;margin:.85rem 0 .45rem">${txt}</div>`;
  const legend=`<div style="display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1rem">${badge('🟢 Exceeding','#dcfce7','#15803d')} ${badge('🟡 Meeting','#ecfccb','#65a30d')} ${badge('🟠 Below Target','#fef3c7','#d97706')} ${badge('⬜ No Data','#f1f5f9','#64748b')}</div>`;

  // ─── DAILY VIEW ──────────────────────────────────────────────────────────────
  if(_scView==='daily'){
    const dk=currentDK||DATES[DATES.length-1]?.k||'';
    html+=`<div style="display:flex;align-items:center;gap:.5rem;margin-bottom:1rem">
      <span style="font-size:.8rem;font-weight:600;color:var(--muted)">📅 Date:</span>
      <select class="pselect" id="scDateSel" onchange="currentDK=this.value;renderScorecard('daily')" style="min-width:auto;max-width:300px">
        ${DATES.map(d=>`<option value="${d.k}"${d.k===dk?' selected':''}>${dk2full(d.k)}</option>`).join('')}
      </select>
    </div>${legend}`;

    // Build table rows for a rep (isCS=true adds target/% columns)
    const dayRow=(emoji,name,isCS,lvlFn)=>{
      const d=getDay(name,dk);
      const p=pf(d?.pct), q=pf(d?.quality);
      const lvl=isCS?csLevel(p,q):lvlFn(q);
      const td=(v,c)=>`<td style="padding:.45rem .55rem;border:1px solid #e8edf2;text-align:center;font-size:.88rem;font-weight:800;color:${c||'#1e293b'}">${v}</td>`;
      return`<tr>
        <td style="padding:.45rem .6rem;border:1px solid #e8edf2;font-size:.85rem;font-weight:700;background:#fafafa;white-space:nowrap">${emoji} ${name}</td>
        ${td(d?.emails||'—')}
        ${isCS?td(d?.target||'—','#64748b'):''}
        ${isCS?`<td style="padding:.45rem .55rem;border:1px solid #e8edf2;text-align:center;background:${p>0?(p>=100?'#dcfce7':p>=96?'#f0fdf4':p>=90?'#fefce8':'#fff1f2'):'transparent'}"><div style="font-size:1.1rem;font-weight:800;color:${pctColor(p>0?p:null)}">${(d?.pct||'—')+(d?.pct?'%':'')}</div></td>`:''}
        ${td((d?.hours||'—')+(d?.hours?'h':''))}
        ${td((d?.quality||'—')+(d?.quality?'%':''),qColor(q>0?q:null))}
        <td style="padding:.45rem .55rem;border:1px solid #e8edf2;text-align:center">${lvlBadge(lvl)}</td>
        ${isCS?`<td style="padding:.45rem .55rem;border:1px solid #e8edf2;text-align:center">
          <div style="font-size:.9rem;font-weight:800;color:${lvl>0?'#15803d':'#94a3b8'}">${CS_AWARD[lvl]}</div>
          <div style="font-size:.56rem;color:#64748b;line-height:1.5;margin-top:.15rem">
            Email: ${p>0?p+'%':'—'} · Quality: ${q>0?q+'%':'—'}<br>
            <span style="color:${LVL_CLR[lvl]}">${LVL_ICON[lvl]} ${LVL_LBL[lvl]}</span>
          </div>
        </td>`:'<td style="border:1px solid #e8edf2"></td>'}
      </tr>`;
    };
    const csTHead=`<thead><tr><th ${TH_REP}>Rep</th><th ${TH}>Emails<br>Handled</th><th ${TH}>Email<br>Target</th><th ${TH}>Email<br>Target %</th><th ${TH}>Hours</th><th ${TH}>Quality</th><th ${TH}>Level</th><th ${TH}>Incentive</th></tr></thead>`;
    const ppTHead=`<thead><tr><th ${TH_REP}>Rep</th><th ${TH}>Cases</th><th ${TH}>Hours</th><th ${TH}>Quality</th><th ${TH}>Level</th><th ${TH}></th></tr></thead>`;
    const ppDayRow=(emoji,name,lvlFn)=>{
      const d=getDay(name,dk);const q=pf(d?.quality);const lvl=lvlFn(q);
      const td=(v,c)=>`<td style="padding:.45rem .55rem;border:1px solid #e8edf2;text-align:center;font-size:.88rem;font-weight:800;color:${c||'#1e293b'}">${v}</td>`;
      return`<tr>
        <td style="padding:.45rem .6rem;border:1px solid #e8edf2;font-size:.85rem;font-weight:700;background:#fafafa;white-space:nowrap">${emoji} ${name}</td>
        ${td(d?.emails||'—')}
        ${td((d?.hours||'—')+(d?.hours?'h':''))}
        ${td((d?.quality||'—')+(d?.quality?'%':''),qColor(q>0?q:null))}
        <td style="padding:.45rem .55rem;border:1px solid #e8edf2;text-align:center">${lvlBadge(lvl)}</td>
        <td style="border:1px solid #e8edf2"></td>
      </tr>`;
    };

    html+=sectionLbl('Customer Service','var(--cs)','var(--cs-light)');
    html+=`<div style="overflow-x:auto;margin-bottom:.75rem"><table style="width:100%;border-collapse:collapse">${csTHead}<tbody>
      ${dayRow('👑','King',true,(p,q)=>csLevel(p,q))}${dayRow('⭐','Patrick',true,(p,q)=>csLevel(p,q))}${dayRow('💫','Gabby',true,(p,q)=>csLevel(p,q))}
    </tbody></table></div>`;
    html+=sectionLbl('Supply Chain','var(--sc)','var(--sc-light)');
    html+=`<div style="overflow-x:auto;margin-bottom:.75rem"><table style="width:100%;border-collapse:collapse">${ppTHead}<tbody>${ppDayRow('📦','Veronica',veronicaQualLevel)}</tbody></table></div>`;
    html+=sectionLbl('PayPal Disputes','var(--pp)','var(--pp-light)');
    html+=`<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse">${ppTHead}<tbody>${ppDayRow('📋','Maria',mariaQualLevel)}</tbody></table></div>`;
    html+=`<div style="margin-top:.6rem;font-size:.7rem;color:var(--muted);font-style:italic">⚠ Dash (—) = no entry for this date in the scorecard sheet.</div>`;

  // ─── WEEKLY VIEW ─────────────────────────────────────────────────────────────
  } else if(_scView==='weekly'){
    const wSel=`<select class="pselect" id="scWeekSel" onchange="renderScorecard('weekly')" style="min-width:auto">
      ${WEEKS.map(w=>`<option value="${w.key}">${scWeekLabel(w.key)}</option>`).join('')}
    </select>`;
    html+=`<div style="display:flex;align-items:center;gap:.5rem;margin-bottom:1rem"><span style="font-size:.8rem;font-weight:600;color:var(--muted)">📅 Week:</span>${wSel}</div>${legend}`;

    const wKey=document.getElementById('scWeekSel')?.value||WEEKS[WEEKS.length-1]?.key||'';
    const weekObj=WEEKS.find(w=>w.key===wKey)||WEEKS[WEEKS.length-1];
    if(!weekObj){html+=`<div class="no-data">No week data.</div>`;document.getElementById('dash').innerHTML=html;return;}

    // Build Mon–Sat day keys for this week
    const{monKey:_sm}=weekBounds(weekObj.dates[0]||DATES[DATES.length-1]?.k);
    const _mon=dk2date(_sm);
    const allDays=[];
    for(let i=0;i<6;i++){const d=new Date(_mon.getTime()+i*86400000);allDays.push(`${d.getMonth()+1}-${d.getDate()}`);}

    const dayHdr=dk=>{const dt=dk2date(dk);const ds=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];return`${ds[dt.getDay()]}<br><span style="font-size:.58rem;color:#94a3b8">${MS[parseInt(dk)]} ${dk.split('-')[1]}</span>`};

    // Weekly aggregate from per-day lookup
    const wkAgg=(name)=>{
      let e=0,t=0,h=0,ah=0,q=[];
      allDays.forEach(dk=>{const d=getDay(name,dk);if(!d)return;if(d.emails!=null)e+=parseFloat(d.emails)||0;if(d.target!=null)t+=parseFloat(d.target)||0;if(d.hours!=null)h+=parseFloat(d.hours)||0;if(d.quality!=null)q.push(parseFloat(d.quality));if(d.adminHours!=null)ah+=parseFloat(d.adminHours)||0;});
      return{emails:e,target:t,hours:+h.toFixed(1),pct:t>0?+((e/t)*100).toFixed(1):null,quality:q.length?+(q.reduce((a,b)=>a+b,0)/q.length).toFixed(1):null,adminHours:+ah.toFixed(1)};
    };

    // CS table
    const csTH=`<thead><tr><th ${TH_REP}>CS Rep</th>${allDays.map(dk=>`<th ${TH}>${dayHdr(dk)}</th>`).join('')}<th ${TH}>Week Total<br><span style="font-weight:400;text-transform:none;font-size:.55rem">(emails handled)</span></th><th ${TH}>Email<br>Target %</th><th ${TH}>Avg<br>Quality</th><th ${TH}>Level</th><th ${TH}>Incentive</th></tr></thead>`;
    const csWkRow=(emoji,name)=>{
      const tot=wkAgg(name);const pct=tot.pct,q=tot.quality;const lvl=csLevel(pct,q);
      return`<tr>
        <td style="padding:.4rem .6rem;border:1px solid #e8edf2;font-size:.82rem;font-weight:700;white-space:nowrap;background:#fafafa">${emoji} ${name}</td>
        ${allDays.map(dk=>csCell(getDay(name,dk))).join('')}
        <td style="padding:.4rem .4rem;border:1px solid #e8edf2;text-align:center"><div style="font-size:.82rem;font-weight:700">${tot.emails.toLocaleString()}</div><div style="font-size:.56rem;color:#64748b">of ${tot.target.toLocaleString()} target emails</div></td>
        <td style="padding:.4rem .4rem;border:1px solid #e8edf2;text-align:center;background:${pct!=null?(pct>=100?'#dcfce7':pct>=96?'#f0fdf4':pct>=90?'#fefce8':'#fff1f2'):'transparent'}"><div style="font-size:1.05rem;font-weight:800;color:${pctColor(pct)}">${pct!=null?pct+'%':'—'}</div></td>
        <td style="padding:.4rem .4rem;border:1px solid #e8edf2;text-align:center;font-size:.88rem;font-weight:800;color:${qColor(q)}">${q!=null?q+'%':'—'}</td>
        <td style="padding:.4rem .4rem;border:1px solid #e8edf2;text-align:center">${lvlBadge(lvl)}</td>
        <td style="padding:.4rem .4rem;border:1px solid #e8edf2;text-align:center">
          <div style="font-size:.95rem;font-weight:800;color:${lvl>0?'#15803d':'#94a3b8'}">${CS_AWARD[lvl]}</div>
          <div style="font-size:.55rem;color:#64748b;line-height:1.55;margin-top:.15rem">
            Email Target %: <strong style="color:${pctColor(pct)}">${pct!=null?pct+'%':'—'}</strong><br>
            Quality: <strong style="color:${qColor(q)}">${q!=null?q+'%':'—'}</strong><br>
            Scheduled Shift Followed: <strong style="color:#15803d">✅ Yes</strong><br>
            Admin Hours Logged: <strong>${tot.adminHours>0?tot.adminHours+'h':'—'}</strong><br>
            <span style="color:${LVL_CLR[lvl]}">${LVL_ICON[lvl]} ${LVL_LBL[lvl]}</span>
          </div>
        </td>
      </tr>`;
    };

    html+=sectionLbl('Customer Service','var(--cs)','var(--cs-light)');
    html+=`<div style="overflow-x:auto;margin-bottom:1.25rem"><table style="width:100%;border-collapse:collapse;font-size:.78rem">
      ${csTH}<tbody>${csWkRow('👑','King')}${csWkRow('⭐','Patrick')}${csWkRow('💫','Gabby')}</tbody>
    </table></div>`;

    // PP / SC tables side by side
    const ppTH=`<thead><tr><th ${TH_REP}>Rep</th>${allDays.map(dk=>`<th ${TH}>${dayHdr(dk)}</th>`).join('')}<th ${TH}>Week Total</th><th ${TH}>Avg Quality</th><th ${TH}>Level</th></tr></thead>`;
    const ppWkRow=(emoji,name,lvlFn)=>{
      const tot=wkAgg(name);const q=tot.quality;const lvl=lvlFn(q);
      return`<tr>
        <td style="padding:.4rem .6rem;border:1px solid #e8edf2;font-size:.82rem;font-weight:700;white-space:nowrap;background:#fafafa">${emoji} ${name}</td>
        ${allDays.map(dk=>ppCell(getDay(name,dk))).join('')}
        <td style="padding:.4rem .4rem;border:1px solid #e8edf2;text-align:center;font-size:.85rem;font-weight:700">${tot.emails.toLocaleString()} cases</td>
        <td style="padding:.4rem .4rem;border:1px solid #e8edf2;text-align:center;font-size:.88rem;font-weight:800;color:${qColor(q)}">${q!=null?q+'%':'—'}</td>
        <td style="padding:.4rem .4rem;border:1px solid #e8edf2;text-align:center">${lvlBadge(lvl)}</td>
      </tr>`;
    };

    html+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
      <div>${sectionLbl('Supply Chain','var(--sc)','var(--sc-light)')}<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:.78rem">${ppTH}<tbody>${ppWkRow('📦','Veronica',veronicaQualLevel)}</tbody></table></div></div>
      <div>${sectionLbl('PayPal Disputes','var(--pp)','var(--pp-light)')}<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:.78rem">${ppTH}<tbody>${ppWkRow('📋','Maria',mariaQualLevel)}</tbody></table></div></div>
    </div>`;

    // ── Jewel — this week's incentive, computed from real audit/score/PP data ──
    const _jwc=jewelWeekCalc(weekObj);
    if(_jwc){
      const _jwBody=`
        ${_jwc.teamMet.map(t=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:.22rem 0;border-bottom:1px dashed #f1f5f9"><span style="font-size:.72rem;color:#374151">${t.name}</span><span style="font-size:.68rem;font-weight:700;color:${t.met?'#15803d':'#94a3b8'}">${t.met?'✅ Met — $5':'— Not met'}</span></div>`).join('')}
        ${_ir('Team KPI Subtotal','$'+_jwc.teamBonus.toFixed(0),`${_jwc.teamMetCount} of 5 team members met their weekly target`,_jwc.teamBonus>0?'#15803d':'#94a3b8')}
        ${_ir('Own Audit Target',_jwc.ownMet?'✅ Met — $10':'Not met — $0',_jwc.auditCounts.map(a=>`${a.name}: ${a.count}/5`).join(' · '),_jwc.ownMet?'#15803d':'#94a3b8')}
        ${_ir('PayPal Wins (Maria)',_jwc.ppWins,`${_jwc.ppWins} won × $0.50`,_jwc.ppWins>0?'#1d4ed8':'#94a3b8')}
        ${_ir('PayPal Win Incentive','$'+_jwc.ppBonus.toFixed(2),'',_jwc.ppBonus>0?'#1d4ed8':'#94a3b8')}`;
      html+=`<div style="margin-top:1.25rem">${_ic('#b45309','#fffbeb','👑 Jewel — '+scWeekLabel(weekObj.key),_jwBody,_jwc.total,'Total Estimated Incentive')}</div>`;
    }

  // ─── MONTHLY VIEW ─────────────────────────────────────────────────────────────
  } else {
    const mSel=`<select class="pselect" id="scMonthSel" onchange="renderScorecard('monthly')" style="min-width:auto">
      ${MONTHS.map(m=>`<option value="${m.key}">${m.label}</option>`).join('')}
    </select>`;
    html+=`<div style="display:flex;align-items:center;gap:.5rem;margin-bottom:1rem"><span style="font-size:.8rem;font-weight:600;color:var(--muted)">📅 Month:</span>${mSel}</div>${legend}`;

    const moKey=document.getElementById('scMonthSel')?.value||MONTHS[MONTHS.length-1]?.key||'';
    const month=MONTHS.find(m=>String(m.key)===String(moKey))||MONTHS[MONTHS.length-1];
    if(!month){html+=`<div class="no-data">No month data.</div>`;document.getElementById('dash').innerHTML=html;return;}

    // Week buckets within month — generate EVERY calendar week that overlaps this month (not just
    // weeks that already have data rows), so the table always shows the full month's shape (typically
    // 4, occasionally 5 weeks) by default instead of only growing as data arrives.
    const wm=new Map();
    {
      const _moNum=+month.key;
      const _moYearSC=new Date().getFullYear();
      const _firstOfMo=new Date(_moYearSC,_moNum-1,1);
      const _lastOfMo=new Date(_moYearSC,_moNum,0);
      for(let _d=new Date(_firstOfMo);_d<=_lastOfMo;_d.setDate(_d.getDate()+1)){
        const _dk=`${_d.getMonth()+1}-${_d.getDate()}`;
        const{monKey,label}=weekBounds(_dk);
        if(!wm.has(monKey))wm.set(monKey,{key:monKey,label,dates:[]});
      }
    }
    month.dates.slice().sort(sortDK).forEach(dk=>{
      const{monKey}=weekBounds(dk);
      if(wm.has(monKey))wm.get(monKey).dates.push(dk);
    });
    const monthWeeks=[...wm.values()].sort((a,b)=>sortDK(a.key,b.key));

    // Week aggregate using DB.score directly (shared wkAggDB helper defined above)
    const moTotal=(name)=>{
      let e=0,t=0,h=0,ah=0,q=[];
      monthWeeks.forEach(wk=>{const d=wkAggDB(name,wk);if(!d)return;e+=d.emails;t+=d.target;h+=d.hours;if(d.quality!=null)q.push(d.quality);ah+=d.adminHours||0;});
      return{emails:e,target:t,pct:t>0?+((e/t)*100).toFixed(1):null,hours:+h.toFixed(1),quality:q.length?+(q.reduce((a,b)=>a+b,0)/q.length).toFixed(1):null,adminHours:+ah.toFixed(1)};
    };

    // Local (month-scoped) week numbering — position within THIS month's own week list, so it's
    // correct even for placeholder weeks that don't (yet) exist in the global WEEKS array.
    const _moWeekNum=wk=>monthWeeks.findIndex(w=>w.key===wk.key)+1;
    const wkShort=wk=>{
      const parts=(wk.key||'').split('-').map(Number);
      const mo=parts[0],day=parts[1];
      return `${MS[mo]||''} ${day||''}<br><span style="font-size:.55rem;color:#94a3b8;font-weight:700">Week ${_moWeekNum(wk)}</span>`;
    };
    const wkCell=(d,isCS)=>{
      if(!d)return`<td style="padding:.35rem .35rem;border:1px solid #e8edf2;text-align:center;background:#f8fafc"><span style="color:#cbd5e1;font-size:.7rem">—</span></td>`;
      const val=isCS?d.pct:d.quality;
      const bg=val==null?'#fafafa':val>=(isCS?96:95)?'#f0fdf4':val>=(isCS?90:90)?'#fefce8':'#fff1f2';
      const clr=isCS?pctColor(val):qColor(val);
      if(isCS){
        // CS: % is primary; emails handled shown small below
        return`<td style="padding:.35rem .35rem;border:1px solid #e8edf2;text-align:center;background:${bg}"><div style="font-size:.88rem;font-weight:800;color:${clr}">${val!=null?val+'%':'—'}</div><div style="font-size:.55rem;color:#64748b">${d.emails.toLocaleString()} hdld</div></td>`;
      }
      // PP/SC: cases primary, quality below
      return`<td style="padding:.35rem .35rem;border:1px solid #e8edf2;text-align:center;background:${bg}"><div style="font-size:.8rem;font-weight:700;color:#1e293b">${d.emails.toLocaleString()}</div><div style="font-size:.58rem;font-weight:600;color:${clr}">${val!=null?val+'%':'—'}</div></td>`;
    };

    // CS monthly table
    const moCSHead=`<thead><tr><th ${TH_REP}>Rep</th>${monthWeeks.map(wk=>`<th ${TH}>${wkShort(wk)}</th>`).join('')}<th ${TH}>Month Total<br><span style="font-weight:400;text-transform:none;font-size:.55rem">(emails handled)</span></th><th ${TH}>Email<br>Target %</th><th ${TH}>Avg<br>Quality</th><th ${TH}>Level</th><th ${TH}>Incentive</th></tr></thead>`;
    const csMonthRow=(emoji,name)=>{
      const tot=moTotal(name);const pct=tot.pct,q=tot.quality;const lvl=csLevel(pct,q);
      return`<tr>
        <td style="padding:.4rem .6rem;border:1px solid #e8edf2;font-size:.82rem;font-weight:700;white-space:nowrap;background:#fafafa">${emoji} ${name}</td>
        ${monthWeeks.map(wk=>wkCell(wkAggDB(name,wk),true)).join('')}
        <td style="padding:.35rem .35rem;border:1px solid #e8edf2;text-align:center"><div style="font-size:.82rem;font-weight:700">${tot.emails.toLocaleString()}</div><div style="font-size:.56rem;color:#64748b">of ${tot.target.toLocaleString()} target emails</div></td>
        <td style="padding:.35rem .35rem;border:1px solid #e8edf2;text-align:center;background:${pct!=null?(pct>=100?'#dcfce7':pct>=96?'#f0fdf4':pct>=90?'#fefce8':'#fff1f2'):'transparent'}"><div style="font-size:1.05rem;font-weight:800;color:${pctColor(pct)}">${pct!=null?pct+'%':'—'}</div></td>
        <td style="padding:.35rem .35rem;border:1px solid #e8edf2;text-align:center;font-size:.88rem;font-weight:800;color:${qColor(q)}">${q!=null?q+'%':'—'}</td>
        <td style="padding:.35rem .35rem;border:1px solid #e8edf2;text-align:center">${lvlBadge(lvl)}</td>
        <td style="padding:.35rem .35rem;border:1px solid #e8edf2;text-align:center">
          <div style="font-size:.95rem;font-weight:800;color:${lvl>0?'#15803d':'#94a3b8'}">${CS_AWARD[lvl]}</div>
          <div style="font-size:.55rem;color:#64748b;line-height:1.55;margin-top:.15rem">
            Email Target %: <strong style="color:${pctColor(pct)}">${pct!=null?pct+'%':'—'}</strong><br>
            Quality: <strong style="color:${qColor(q)}">${q!=null?q+'%':'—'}</strong><br>
            Scheduled Shift Followed: <strong style="color:#15803d">✅ Yes</strong><br>
            Admin Hours Logged: <strong>${tot.adminHours>0?tot.adminHours+'h':'—'}</strong><br>
            <span style="color:${LVL_CLR[lvl]}">${LVL_ICON[lvl]} ${LVL_LBL[lvl]}</span>
          </div>
        </td>
      </tr>`;
    };

    html+=sectionLbl('Customer Service','var(--cs)','var(--cs-light)');
    html+=`<div style="overflow-x:auto;margin-bottom:1.25rem"><table style="width:100%;border-collapse:collapse;font-size:.78rem">
      ${moCSHead}<tbody>${csMonthRow('👑','King')}${csMonthRow('⭐','Patrick')}${csMonthRow('💫','Gabby')}</tbody>
    </table></div>`;

    // PP / SC monthly
    const moPPHead=`<thead><tr><th ${TH_REP}>Rep</th>${monthWeeks.map(wk=>`<th ${TH}>${wkShort(wk)}</th>`).join('')}<th ${TH}>Month Total</th><th ${TH}>Avg Quality</th><th ${TH}>Level</th></tr></thead>`;
    const ppMonthRow=(emoji,name,lvlFn)=>{
      const tot=moTotal(name);const q=tot.quality;const lvl=lvlFn(q);
      return`<tr>
        <td style="padding:.4rem .6rem;border:1px solid #e8edf2;font-size:.82rem;font-weight:700;white-space:nowrap;background:#fafafa">${emoji} ${name}</td>
        ${monthWeeks.map(wk=>wkCell(wkAggDB(name,wk),false)).join('')}
        <td style="padding:.35rem .35rem;border:1px solid #e8edf2;text-align:center;font-size:.85rem;font-weight:700">${tot.emails.toLocaleString()} cases</td>
        <td style="padding:.35rem .35rem;border:1px solid #e8edf2;text-align:center;font-size:.88rem;font-weight:800;color:${qColor(q)}">${q!=null?q+'%':'—'}</td>
        <td style="padding:.35rem .35rem;border:1px solid #e8edf2;text-align:center">${lvlBadge(lvl)}</td>
      </tr>`;
    };
    html+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
      <div>${sectionLbl('Supply Chain','var(--sc)','var(--sc-light)')}<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:.78rem">${moPPHead}<tbody>${ppMonthRow('📦','Veronica',veronicaQualLevel)}</tbody></table></div></div>
      <div>${sectionLbl('PayPal Disputes','var(--pp)','var(--pp-light)')}<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:.78rem">${moPPHead}<tbody>${ppMonthRow('📋','Maria',mariaQualLevel)}</tbody></table></div></div>
    </div>`;

    // ─── INCENTIVE METRICS PANEL ─────────────────────────────────────────────
    // PayPal / Maria: won cases counted by RESOLUTION date (Col I) + stored dispute rate
    const _scYear=new Date().getFullYear();
    const _mpd=calcPPDisputes(month.dates,_scYear);
    const _mWon=_mpd.wonByResolved; // wins where Col I (resolution date) falls in this month
    const _mBase=+(_mWon*0.75).toFixed(2);
    let _drVal=null;
    try{const _r=localStorage.getItem('ppDR_'+month.key);if(_r!=null&&_r!=='')_drVal=parseFloat(_r);}catch(_e){}
    const _drBonus=_drVal===null?null:_drVal<=1.5?150:_drVal<=2.0?75:_drVal<=2.5?50:0;
    const _drBonusTxt=_drVal===null?'—':_drBonus>0?'+$'+_drBonus:'$0 (rate above 2.50%)';
    const _drBonusClr=_drBonus===null?'#94a3b8':_drBonus>0?'#15803d':'#dc2626';
    const _drTierNote=_drVal===null?'Enter dispute rate below to unlock bonus':_drVal<=1.5?'Qualifies for ≤1.50% tier → $150':_drVal<=2.0?'Qualifies for ≤2.00% tier → $75':_drVal<=2.5?'Qualifies for ≤2.50% tier → $50':'Rate above 2.50% — no bonus earned';
    const _mTotal=+(_mBase+(_drBonus||0)).toFixed(2);

    // Supply Chain / Veronica: quality + volume from scorecard
    const _vMo=moTotal('Veronica');
    const _vQ=_vMo.quality;
    const _vCases=Math.round(_vMo.emails||0);
    const _vQB=_vQ==null?0:_vQ>=91?50:_vQ>=85?40:0;
    const _vQNote=_vQ==null?'No quality data yet':_vQ>=91?`${_vQ}% ≥ 91% — $50 bonus`:_vQ>=85?`${_vQ}% = 85–90% — $40 bonus`:`${_vQ}% below 85% — no quality bonus`;
    const _vVK=_vCases>=200?30:_vCases>=151?20:_vCases>=100?10:0;
    const _vVKNote=_vCases>=200?`${_vCases} cases → 200+ tier ($30)`:_vCases>=151?`${_vCases} cases → 151–200 tier ($20)`:_vCases>=100?`${_vCases} cases → 100–150 tier ($10)`:`${_vCases} cases — under 100, no kicker`;
    const _vTotal=_vQB+_vVK;

    // CS: per-rep incentive from monthly totals
    const _csReps=['King','Patrick','Gabby'].map(nm=>{const t=moTotal(nm);const l=csLevel(t.pct,t.quality);return{nm,pct:t.pct,q:t.quality,l,aw:CS_AWARD[l]};});
    const _csTot=_csReps.reduce((s,r)=>{const n=parseFloat((r.aw||'0').replace(/[$—]/g,''));return s+(isNaN(n)?0:n);},0);

    // (row/card builders _ir/_ic are shared helpers defined above)

    // CS card body
    const _csBody=_csReps.map(r=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:.28rem 0;border-bottom:1px dashed #f1f5f9;gap:.5rem"><div><div style="font-size:.73rem;font-weight:600;color:#374151">${r.nm}</div><div style="font-size:.56rem;color:#94a3b8;line-height:1.35">Email Target: <strong style="color:${pctColor(r.pct)}">${r.pct!=null?r.pct+'%':'—'}</strong> &nbsp;·&nbsp; Quality: <strong style="color:${qColor(r.q)}">${r.q!=null?r.q+'%':'—'}</strong><br>${LVL_ICON[r.l]} ${LVL_LBL[r.l]}</div></div><div style="font-size:.9rem;font-weight:800;color:${r.l>0?'#15803d':'#94a3b8'}">${r.aw}</div></div>`).join('');

    // Veronica card body
    const _vBody=`${_ir('Average Quality Score',_vQ!=null?_vQ+'%':'—',_vQNote,_vQ!=null?(_vQ>=85?'#15803d':'#dc2626'):'#94a3b8')}${_ir('Quality Bonus',_vQB>0?'+$'+_vQB:'$0','',_vQB>0?'#15803d':'#94a3b8')}${_ir('Cases Handled',_vCases,_vVKNote,_vVK>0?'#1d4ed8':'#94a3b8')}${_ir('Volume Kicker',_vVK>0?'+$'+_vVK:'$0','100–150 = $10 · 151–200 = $20 · 200+ = $30',_vVK>0?'#1d4ed8':'#94a3b8')}`;

    // Maria card body (with editable dispute rate input)
    const _mBody=`${_ir('Won Dispute Cases',_mWon,`${_mWon} cases found via Col I (resolution date) in ${month.label}`,_mWon>0?'#1d4ed8':'#94a3b8')}${_ir('Base Incentive','$'+_mBase,_mWon+' won × $0.75 per case',_mBase>0?'#15803d':'#94a3b8')}<div style="padding:.28rem 0;border-bottom:1px dashed #f1f5f9"><div style="display:flex;justify-content:space-between;align-items:center;gap:.5rem"><div style="flex:1"><div style="font-size:.73rem;font-weight:600;color:#374151">Monthly Dispute Rate</div><div style="font-size:.56rem;color:#94a3b8">≤2.50%=+$50 · ≤2.00%=+$75 · ≤1.50%=+$150</div></div><div style="display:flex;align-items:center;gap:.2rem"><input type="number" step="0.01" min="0" max="100" placeholder="e.g. 2.07" value="${_drVal!==null?_drVal:''}" style="width:66px;padding:.2rem .3rem;border:1px solid #d1d5db;border-radius:4px;font-size:.73rem;font-family:inherit;text-align:right;color:#374151;outline-color:#7c3aed" onchange="(function(v){try{v=v.trim();if(v)localStorage.setItem('ppDR_${month.key}',v);else localStorage.removeItem('ppDR_${month.key}');}catch(_){} renderScorecard('monthly');})(this.value)"><span style="font-size:.68rem;color:#64748b;font-weight:600">%</span></div></div><div style="font-size:.59rem;font-weight:600;color:${_drBonusClr};margin-top:.18rem">${_drTierNote}</div></div>${_ir('Dispute Rate Bonus',_drBonusTxt,'Highest qualifying tier — bonuses do not stack',_drBonusClr)}`;

    // ── Jewel — computed for real from audit/score/PP data, one calc per week in this month ──
    const _jWeekCalcs=monthWeeks.map(wk=>({wk,c:jewelWeekCalc(wk)}));
    const _jTeamVals=_jWeekCalcs.map(x=>x.c?x.c.teamBonus:null);
    const _jOwnVals =_jWeekCalcs.map(x=>x.c?(x.c.ownBonus):null);
    const _jTeamSum=_jWeekCalcs.reduce((s,x)=>s+(x.c?x.c.teamBonus:0),0);
    const _jOwnSum =_jWeekCalcs.reduce((s,x)=>s+(x.c?x.c.ownBonus:0),0);
    const _jWonCases=_jWeekCalcs.reduce((s,x)=>s+(x.c?x.c.ppWins:0),0);
    const _jWonAmt=+(_jWonCases*0.5).toFixed(2);

    const _jWkRow=(label,items)=>`<div style="padding:.22rem 0;border-bottom:1px dashed #f1f5f9">
      <div style="font-size:.65rem;font-weight:700;color:#374151;margin-bottom:.18rem">${label}</div>
      <div style="display:grid;grid-template-columns:repeat(${items.length},1fr);gap:.25rem">
        ${items.map(({wk,v})=>`<div style="text-align:center;background:${typeof v==='number'&&v>0?'#f0fdf4':'#f8fafc'};border-radius:4px;padding:.18rem .1rem">
          <div style="font-size:.52rem;color:#94a3b8;font-weight:600">Week ${_moWeekNum(wk)}</div>
          <div style="font-size:.68rem;font-weight:700;color:${typeof v==='number'&&v>0?'#15803d':'#94a3b8'}">${typeof v==='number'?'$'+v.toFixed(0):'—'}</div>
        </div>`).join('')}
      </div>
    </div>`;

    const _jBody=_jWeekCalcs.length
      ?`${_jWkRow('Team Members Met KPIs ($5/member/week)',_jWeekCalcs.map(x=>({wk:x.wk,v:_jTeamVals[_jWeekCalcs.indexOf(x)]})))}${_jWkRow('Own Audit Target Met ($10/week)',_jWeekCalcs.map(x=>({wk:x.wk,v:_jOwnVals[_jWeekCalcs.indexOf(x)]})))}${_ir('Team KPI Subtotal','$'+_jTeamSum.toFixed(0),'',_jTeamSum>0?'#15803d':'#94a3b8')}${_ir('Own KPI Subtotal','$'+_jOwnSum.toFixed(0),'',_jOwnSum>0?'#15803d':'#94a3b8')}${_ir('Won Cases Incentive','$'+_jWonAmt.toFixed(2),_jWonCases+' cases × $0.50',_jWonAmt>0?'#1d4ed8':'#94a3b8')}`
      :`<div style="padding:1.5rem;text-align:center;color:#94a3b8;font-size:.75rem">No data for ${month.label} yet</div>`;
    const _jTotalAmt=+(_jTeamSum+_jOwnSum+_jWonAmt).toFixed(2);

    html+=`<div style="margin-top:1.75rem">
      <div style="font-size:.57rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:#7c3aed;padding:.25rem .7rem;background:#f5f3ff;border-left:3px solid #7c3aed;border-radius:3px;margin-bottom:.8rem">💰 Incentive Metrics — ${month.label}</div>
      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:.85rem">
        ${_ic('var(--cs)','var(--cs-light)','👥 Customer Service',_csBody,_csTot,'Team Total Incentive')}
        ${_ic('var(--sc)','var(--sc-light)','📦 Supply Chain — Veronica',_vBody,_vTotal)}
        ${_ic('var(--pp)','var(--pp-light)','💳 PayPal Disputes — Maria',_mBody,_mTotal)}
        ${_ic('#b45309','#fffbeb','👑 Jewel',_jBody,_jTotalAmt,'Total Estimated Incentive')}
      </div>
    </div>`;
  }

  document.getElementById('dash').innerHTML=html;
  if(_scView==='weekly'){const s=document.getElementById('scWeekSel');if(s)s.value=WEEKS[WEEKS.length-1]?.key||'';}
  if(_scView==='monthly'){const s=document.getElementById('scMonthSel');if(s){const mo=new Date().getMonth()+1;const cur=MONTHS.find(m=>m.key===mo);s.value=cur?String(cur.key):String(MONTHS[MONTHS.length-1]?.key||'');}}
}


// ─── PP DISPUTE DRILL-DOWN ────────────────────────────────────────────────────
const _PP_WIN_S   = ["we've decided the case in your favor","case closed - offer accepted","case closed – offer accepted","case closed - voluntarily","case closed – voluntarily","case closed - voluntary","case closed – voluntary","automatic close","automatic closed"];
const _PP_LOST_S  = ["case closed x","case closed ❌","case closed in buyer's favor","case closed - buyer's favor","case closed – buyer's favor"];
const _PP_OPEN_S  = ["in progress","awaiting paypal"];

function _ppRowClass(r){
  const st=(r[5]||'').toLowerCase();
  if(_PP_WIN_S.some(s=>st.includes(s)))return 'win';
  if(_PP_LOST_S.some(s=>st.includes(s)))return 'loss';
  return '';
}
function _ppRowColor(cls){return cls==='win'?'#f0fdf4':cls==='loss'?'#fff1f2':'#fffbeb';}

function showPPDrilldown(filterKey){
  const dates=window._mpdDates||null;
  const ddYear=window._mpdYear||null;
  const allRows=DB.ppDisputes.filter(r=>{
    if(!dates)return true;
    const dk=anyDateKey(r[1])||dateKey(r[1]);
    if(!dk||!dates.includes(dk))return false;
    if(ddYear!=null){const yr=_extractYear(r[1]);if(yr!=null&&yr!==ddYear)return false;}
    return true;
  });
  let rows,title;
  if(filterKey==='won'){rows=allRows.filter(r=>_PP_WIN_S.some(s=>(r[5]||'').toLowerCase().includes(s)));title='Won Disputes';}
  else if(filterKey==='lost'){rows=allRows.filter(r=>_PP_LOST_S.some(s=>(r[5]||'').toLowerCase().includes(s)));title='Lost Disputes';}
  else if(filterKey==='ongoing'){rows=allRows.filter(r=>_PP_OPEN_S.some(s=>(r[5]||'').toLowerCase().includes(s))&&!_PP_WIN_S.some(s=>(r[5]||'').toLowerCase().includes(s))&&!_PP_LOST_S.some(s=>(r[5]||'').toLowerCase().includes(s)));title='Ongoing Disputes';}
  else if(filterKey==='closed'){rows=allRows.filter(r=>_PP_WIN_S.some(s=>(r[5]||'').toLowerCase().includes(s))||_PP_LOST_S.some(s=>(r[5]||'').toLowerCase().includes(s)));title='Closed Disputes';}
  else{rows=allRows;title='All Disputes';}

  const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const trs=rows.length?rows.map(r=>{
    const cls=_ppRowClass(r);
    const bg=_ppRowColor(cls);
    return `<tr style="background:${bg}">
      <td style="white-space:nowrap;padding:.4rem .6rem;font-size:.78rem;border-bottom:1px solid #e2e8f0">${esc(r[1]||'—')}</td>
      <td style="white-space:nowrap;padding:.4rem .6rem;font-size:.78rem;border-bottom:1px solid #e2e8f0;color:#64748b">${esc(r[2]||'—')}</td>
      <td style="padding:.4rem .6rem;font-size:.78rem;border-bottom:1px solid #e2e8f0">${esc(r[0]||'—')}</td>
      <td style="padding:.4rem .6rem;font-size:.78rem;border-bottom:1px solid #e2e8f0">${esc(r[3]||'—')}</td>
      <td style="padding:.4rem .6rem;font-size:.78rem;border-bottom:1px solid #e2e8f0">${esc(r[4]||'—')}</td>
      <td style="padding:.4rem .6rem;font-size:.75rem;border-bottom:1px solid #e2e8f0;font-weight:600;color:${cls==='win'?'#15803d':cls==='loss'?'#dc2626':'#d97706'}">${esc(r[5]||'—')}</td>
    </tr>`;}).join(''):`<tr><td colspan="6" style="text-align:center;color:#94a3b8;padding:1.5rem;font-size:.85rem">No records found for this filter.</td></tr>`;

  const modal=`<div id="pp-dd-overlay" onclick="if(event.target.id==='pp-dd-overlay')closePPDrilldown()" style="position:fixed;inset:0;background:rgba(15,23,42,.6);z-index:9999;display:flex;align-items:center;justify-content:center;padding:1rem">
    <div style="background:#fff;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.35);max-width:900px;width:100%;max-height:82vh;display:flex;flex-direction:column;overflow:hidden">
      <div style="padding:.85rem 1.1rem;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;background:#faf5ff">
        <div>
          <div style="font-size:.54rem;font-weight:800;text-transform:uppercase;letter-spacing:.14em;color:#7c3aed">PayPal Disputes — Detail View</div>
          <div style="font-size:.95rem;font-weight:800;color:#1e293b;margin-top:.12rem">${rows.length} ${title}</div>
        </div>
        <button onclick="closePPDrilldown()" style="background:none;border:none;cursor:pointer;font-size:1.3rem;color:#94a3b8;line-height:1;padding:.3rem .55rem;border-radius:6px" onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background='none'">✕</button>
      </div>
      <div style="overflow:auto;padding:.85rem">
        <table style="width:100%;min-width:580px;border-collapse:collapse">
          <thead>
            <tr style="background:#f8fafc">
              <th style="text-align:left;padding:.45rem .6rem;font-size:.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#64748b;border-bottom:2px solid #e2e8f0">Date Lodged</th>
              <th style="text-align:left;padding:.45rem .6rem;font-size:.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#94a3b8;border-bottom:2px solid #e2e8f0">Date Resolved</th>
              <th style="text-align:left;padding:.45rem .6rem;font-size:.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#64748b;border-bottom:2px solid #e2e8f0">Store</th>
              <th style="text-align:left;padding:.45rem .6rem;font-size:.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#64748b;border-bottom:2px solid #e2e8f0">Dispute Type</th>
              <th style="text-align:left;padding:.45rem .6rem;font-size:.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#64748b;border-bottom:2px solid #e2e8f0">Reason</th>
              <th style="text-align:left;padding:.45rem .6rem;font-size:.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#64748b;border-bottom:2px solid #e2e8f0">Status / Outcome</th>
            </tr>
          </thead>
          <tbody>${trs}</tbody>
        </table>
      </div>
    </div>
  </div>`;
  closePPDrilldown();
  document.body.insertAdjacentHTML('beforeend',modal);
}

function closePPDrilldown(){
  const el=document.getElementById('pp-dd-overlay');
  if(el)el.remove();
}

// ─── INIT ────────────────────────────────────────────────────────────────────
loadAll();
</script>
