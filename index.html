<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>AMS Team Performance Dashboard v4.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --cs:#3b82f6; --cs-light:#eff6ff; --cs-mid:#bfdbfe; --cs-dark:#1d4ed8;
  --pp:#8b5cf6; --pp-light:#f5f3ff; --pp-mid:#ddd6fe; --pp-dark:#6d28d9;
  --sc:#10b981; --sc-light:#ecfdf5; --sc-mid:#a7f3d0; --sc-dark:#047857;
  --win:#16a34a; --win-bg:#dcfce7;
  --los:#dc2626; --los-bg:#fee2e2;
  --warn:#f59e0b; --warn-bg:#fffbeb;
  --border:#e2e8f0; --border2:#f1f5f9;
  --text:#1e293b; --muted:#64748b; --subtle:#94a3b8;
  --bg:#f0f4f8;
  --radius:12px; --radius-sm:8px;
  --shadow:0 4px 24px rgba(0,0,0,.09);
  --shadow-sm:0 2px 8px rgba(0,0,0,.06);
}
body {
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:14px;
  line-height:1.5;
  min-height:100vh;
}

/* ═══ SHELL ═══ */
.shell { max-width:1400px; margin:0 auto; }

/* ═══ TOP BAR ═══ */
.topbar {
  background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 60%,#0f172a 100%);
  padding:1rem 1.75rem;
  display:flex; align-items:center; justify-content:space-between; gap:1rem; flex-wrap:wrap;
  position:sticky; top:0; z-index:100;
  box-shadow:0 2px 20px rgba(0,0,0,.3);
}
.topbar-brand .logo  { font-size:.6rem;text-transform:uppercase;letter-spacing:.15em;color:rgba(255,255,255,.35);margin-bottom:2px; }
.topbar-brand .title { font-size:1.1rem;font-weight:800;color:#fff;letter-spacing:-.02em; }
.topbar-right { display:flex;align-items:center;gap:.5rem;flex-wrap:wrap; }
.btn-refresh {
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;
  padding:.4rem .9rem;border-radius:6px;font-size:.78rem;font-weight:600;
  font-family:inherit;cursor:pointer;transition:all .2s;
}
.btn-refresh:hover { background:rgba(255,255,255,.22); }
.status-chip {
  font-size:.68rem;color:rgba(255,255,255,.4);
  background:rgba(255,255,255,.07);padding:.3rem .75rem;border-radius:20px;
}

/* ═══ TAB NAV ═══ */
.tab-nav {
  background:#fff;
  border-bottom:2px solid var(--border);
  padding:0 1.75rem;
  display:flex;gap:0;
  position:sticky; top:60px; z-index:99;
  box-shadow:0 2px 8px rgba(0,0,0,.04);
}
.tab-btn {
  padding:.9rem 1.35rem;font-size:.875rem;font-weight:600;
  color:var(--muted);background:none;border:none;
  border-bottom:3px solid transparent;margin-bottom:-2px;
  cursor:pointer;transition:all .18s;white-space:nowrap;font-family:inherit;
}
.tab-btn:hover:not(.active) { color:var(--text);background:#f8fafc; }
.tab-btn.active.cs  { color:var(--cs);  border-bottom-color:var(--cs); }
.tab-btn.active.pp  { color:var(--pp);  border-bottom-color:var(--pp); }
.tab-btn.active.sc  { color:var(--sc);  border-bottom-color:var(--sc); }
.tab-btn.active.all    { color:var(--text);border-bottom-color:#334155; }
.tab-btn.active.sc-tab { color:#7c3aed;border-bottom-color:#7c3aed; }
.tab-btn.active.sch-tab { color:#0891b2;border-bottom-color:#0891b2; }
.tab-btn.active.cmp-tab { color:#6d28d9;border-bottom-color:#6d28d9; }

/* ═══ PERIOD STRIP ═══ */
.period-strip {
  background:#fff;border-bottom:1px solid var(--border);
  padding:.85rem 1.75rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;
}
.period-strip.hidden { display:none; }
.pnav {
  background:#f8fafc;border:1px solid var(--border);color:var(--text);
  width:36px;height:36px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:.9rem;font-family:inherit;transition:all .15s;
}
.pnav:hover { border-color:var(--cs);color:var(--cs);background:var(--cs-light); }
.plabel {
  font-size:1.15rem;font-weight:800;color:var(--text);
  background:#f8fafc;border:1px solid var(--border);border-radius:6px;
  padding:.4rem 1.1rem;min-width:260px;text-align:center;
}
.pselect {
  border:1.5px solid var(--border);border-radius:6px;padding:.45rem .9rem;
  font-size:1.15rem;font-weight:800;font-family:inherit;color:var(--text);
  background:#f8fafc;cursor:pointer;outline:none;min-width:250px;
}

/* ═══ PAGE ═══ */
.page { padding:1.25rem 1.75rem; }

/* ═══ SUMMARY BAR ═══ */
.sum-bar {
  display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));
  background:#fff;border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;margin-bottom:1.25rem;box-shadow:var(--shadow-sm);
}
.sum-card { padding:1rem 1.1rem;border-right:1px solid var(--border); }
.sum-card:last-child { border-right:none; }
.sum-lbl { font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700;margin-bottom:.3rem; }
.sum-num { font-size:1.75rem;font-weight:800;color:var(--text);line-height:1;margin-bottom:.2rem;letter-spacing:-.03em; }
.sum-sub { font-size:.7rem;color:var(--muted); }

/* ═══ TEAM BOXES ═══ */
.teams-grid {
  display:grid;gap:1.25rem;
  grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
}
.team-box {
  background:#fff;border-radius:var(--radius);
  border:1px solid var(--border);
  box-shadow:var(--shadow-sm);
  overflow:hidden;
}

/* Team box header */
.team-box-head {
  padding:1rem 1.25rem;
  display:flex;align-items:center;justify-content:space-between;gap:.75rem;
}
.team-box.cs  .team-box-head { background:var(--cs);  color:#fff; }
.team-box.pp  .team-box-head { background:var(--pp);  color:#fff; }
.team-box.sc  .team-box-head { background:var(--sc);  color:#fff; }

.team-head-left .team-icon  { font-size:1.3rem;margin-bottom:2px; }
.team-head-left .team-name  { font-size:1rem;font-weight:800;letter-spacing:-.01em; }
.team-head-left .team-sub   { font-size:.72rem;opacity:.75;margin-top:1px; }
.team-head-right { text-align:right;flex-shrink:0; }
.team-head-stat-val { font-size:1.8rem;font-weight:800;line-height:1;letter-spacing:-.04em; }
.team-head-stat-lbl { font-size:.65rem;opacity:.65;text-transform:uppercase;letter-spacing:.07em;margin-top:1px; }

/* Team box body */
.team-box-body { padding:1rem 1.25rem; }

/* ── Rep cards inside CS box ── */
.rep-cards { display:flex;flex-direction:column;gap:.625rem;margin-bottom:.875rem; }
.rep-card { background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border);overflow:hidden; }
.rep-card-head {
  display:flex;align-items:center;justify-content:space-between;
  padding:.55rem .875rem;
  border-bottom:1px solid var(--border);
  background:#fff;
}
.rep-name { font-weight:700;font-size:.875rem;display:flex;align-items:center;gap:.375rem; }
.rbadge {
  font-size:.68rem;font-weight:700;padding:.2rem .55rem;border-radius:20px;
  letter-spacing:.02em;
}
.rbadge.excellent { background:#d1fae5;color:#065f46; }
.rbadge.good      { background:#dbeafe;color:#1e40af; }
.rbadge.below     { background:#fef3c7;color:#92400e; }
.rbadge.off       { background:#f1f5f9;color:var(--muted); }
.rbadge.active    { background:#dbeafe;color:#1e40af; }

.rep-card-stats { display:grid;grid-template-columns:repeat(4,1fr);gap:0; }
.rep-stat { padding:.55rem .75rem;border-right:1px solid var(--border2);text-align:center; }
.rep-stat:last-child { border-right:none; }
.rep-stat-lbl { font-size:.6rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700;margin-bottom:.25rem; }
.rep-stat-val { font-size:1.1rem;font-weight:800;color:var(--text);line-height:1; }
.rep-stat-val.green { color:var(--win); }
.rep-stat-val.amber { color:#d97706; }
.rep-stat-val.muted { color:var(--subtle);font-size:.8rem;font-weight:500; }

/* ── Volume mini table inside support boxes ── */
.vol-grid { display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.875rem; }
.vol-tile {
  background:#fff;border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:.625rem .75rem;
}
.vol-tile-lbl { font-size:.65rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700;margin-bottom:.25rem; }
.vol-tile-val { font-size:1.5rem;font-weight:800;color:var(--text);line-height:1;letter-spacing:-.03em; }
.vol-tile-val.green { color:var(--win); }
.vol-tile-val.red   { color:var(--los); }
.vol-tile-val.muted { color:var(--subtle); }

/* ── Score row (hours/cases/quality for Maria, Veronica) ── */
.score-row {
  display:flex;gap:0;background:var(--bg);border:1px solid var(--border);
  border-radius:var(--radius-sm);overflow:hidden;margin-bottom:.875rem;
}
.score-cell { flex:1;padding:.75rem .875rem;border-right:1px solid var(--border);text-align:center; }
.score-cell:last-child { border-right:none; }
.score-lbl { font-size:.6rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700;margin-bottom:.3rem; }
.score-val { font-size:1.4rem;font-weight:800;color:var(--text);line-height:1;letter-spacing:-.03em; }
.score-val.green { color:var(--win); }

/* ── EOD detail (challenges / actions) ── */
.eod-section { margin-bottom:.625rem; }
.eod-title { font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.35rem; }
.eod-card {
  background:var(--bg);border:1px solid var(--border);border-radius:6px;
  padding:.55rem .75rem;font-size:.82rem;color:#334155;line-height:1.6;
  border-left:3px solid transparent;
}
.eod-card.green { border-left-color:var(--sc); }
.eod-card.amber { border-left-color:var(--warn); }
.eod-card.red   { border-left-color:var(--los); }
.eod-case { margin-bottom:.375rem; }
.eod-case:last-child { margin-bottom:0; }
.eod-case-head { font-weight:600;font-size:.8rem;color:var(--text);margin-bottom:.15rem; }
.eod-case-body { font-size:.8rem;color:#475569; }
.case-sep { height:1px;background:var(--border2);margin:.375rem 0; }

/* ── Expandable toggle ── */
.toggle-btn {
  width:100%;background:none;border:1px solid var(--border);border-radius:6px;
  padding:.45rem .75rem;font-size:.75rem;font-weight:600;font-family:inherit;
  color:var(--muted);cursor:pointer;text-align:center;margin-top:.5rem;
  transition:all .15s;
}
.toggle-btn:hover { background:var(--bg);color:var(--text); }
.collapsible { overflow:hidden;transition:max-height .25s ease; }
.collapsible.closed { max-height:0; }
.collapsible.open   { max-height:2000px; }

/* ── Threat table ── */
.threat-table { width:100%;border-collapse:collapse;font-size:.8rem;margin-top:.5rem; }
.threat-table th { background:#f8fafc;padding:.4rem .6rem;text-align:center;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border-bottom:1px solid var(--border); }
.threat-table td { padding:.45rem .6rem;text-align:center;border-bottom:1px solid var(--border2);font-weight:600; }
.threat-table tr:last-child td { border-bottom:none; }
.threat-table td.rep-col { text-align:left;font-weight:700;color:var(--text); }
.threat-table td.z { color:#d1d5db;font-weight:400; }

/* ── Escalation pill ── */
.esc-pill {
  display:inline-flex;align-items:center;gap:.35rem;
  background:#fee2e2;color:#991b1b;
  border:1px solid #fecaca;border-radius:6px;
  padding:.45rem .75rem;font-size:.8rem;font-weight:600;
  margin-top:.5rem;width:100%;
}

/* ═══ COMPARISON TABLES (weekly/monthly) ═══ */
.tbl-wrap { border-radius:var(--radius-sm);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow-sm); }
.ctbl { width:100%;border-collapse:collapse; }
.ctbl th {
  background:#f8fafc;padding:.55rem .8rem;font-size:.62rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.07em;color:var(--muted);
  border-bottom:1px solid var(--border);border-right:1px solid var(--border2);white-space:nowrap;
}
.ctbl th:last-child { border-right:none; }
.ctbl th.dh { text-align:center;min-width:70px; }
.ctbl th.dh .dn { font-size:.78rem;font-weight:700;color:var(--text);display:block; }
.ctbl th.dh .dd { font-size:.62rem;color:var(--muted);font-weight:500; }
.ctbl th.tot { background:#f0fdf4;text-align:center;color:#065f46; }
.ctbl td { padding:.5rem .8rem;border-bottom:1px solid var(--border2);border-right:1px solid var(--border2);vertical-align:middle;font-size:.875rem;color:#334155; }
.ctbl td:last-child { border-right:none; }
.ctbl tr:last-child td { border-bottom:none; }
.ctbl tbody tr:hover td { background:#f8fafc; }
.mn { font-size:.82rem;color:#334155;font-weight:500;white-space:nowrap; }
.sr td { background:#f8fafc;font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:.3rem .8rem;border-bottom:1px solid var(--border); }
.tr2 td { background:#f0fdf4;font-weight:700;border-top:2px solid var(--sc-mid); }
.nc { text-align:center;font-weight:700;font-size:.9rem;color:var(--text); }
.nc.z    { color:#d1d5db;font-weight:400; }
.nc.win  { background:var(--win-bg);color:var(--win); }
.nc.loss { background:var(--los-bg);color:var(--los); }
.nc.tot  { background:#f0fdf4;color:#065f46; }
.nc.nd   { color:#e2e8f0;font-style:italic;font-size:.72rem;font-weight:400; }

/* ═══ CS ACTIVITY GRID ═══ */
.cs-grid { border-radius:var(--radius-sm);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow-sm); }
.csg-h  { display:grid;background:#f8fafc;border-bottom:2px solid var(--border); }
.csg-r  { display:grid;border-bottom:1px solid var(--border2); }
.csg-r:last-child { border-bottom:none; }
.csg-c  { padding:.55rem .8rem;border-right:1px solid var(--border2);font-size:.82rem; }
.csg-c:last-child { border-right:none; }
.csg-h .csg-c { font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--muted); }
.dbub { display:inline-flex;flex-direction:column;align-items:center;padding:.25rem .4rem;border-radius:6px;font-size:.7rem;width:100%;text-align:center;gap:1px; }
.dbub.act { background:#dcfce7;color:#166534; }
.dbub.off { background:#f1f5f9;color:#94a3b8; }
.dbub.nd  { background:transparent;color:#e2e8f0; }
.dbub .di { font-size:.85rem; }
.dbub .dl { font-weight:700;font-size:.62rem; }

/* ═══ KPI CARDS ═══ */
.kpi-row { display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:.75rem;margin-bottom:1.25rem; }
.kpi { border-radius:var(--radius-sm);padding:1rem 1.1rem;border:1px solid var(--border);background:#fff;border-left-width:3px; }
.kpi.cs-k { border-left-color:var(--cs); }
.kpi.pp-k { border-left-color:var(--pp); }
.kpi.sc-k { border-left-color:var(--sc); }
.kpi.wn-k { border-left-color:var(--win); }
.kpi-em { font-size:1.3rem;margin-bottom:.3rem; }
.kpi-lb { font-size:.63rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:700;margin-bottom:.25rem; }
.kpi-nb { font-size:1.9rem;font-weight:800;color:var(--text);line-height:1;letter-spacing:-.04em; }
.kpi-sb { font-size:.68rem;color:var(--muted);margin-top:.25rem; }

/* ═══ SEC HEADER ═══ */
.sh { display:flex;align-items:center;gap:.6rem;margin-bottom:.875rem;padding-bottom:.6rem;border-bottom:2px solid var(--border); }
.sh.cs-s{border-color:var(--cs);} .sh.pp-s{border-color:var(--pp);} .sh.sc-s{border-color:var(--sc);}
.sh-icon { width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0; }
.sh-icon.cs-s{background:var(--cs-light);} .sh-icon.pp-s{background:var(--pp-light);} .sh-icon.sc-s{background:var(--sc-light);}
.sh-ttl { font-size:.95rem;font-weight:700;color:var(--text); }
.sh-sub { font-size:.72rem;color:var(--muted);font-weight:500;margin-left:auto; }

/* ═══ MISC ═══ */
.divider { height:1px;background:var(--border);margin:1.25rem 0; }
.no-data { text-align:center;color:var(--subtle);padding:2rem;font-style:italic; }
.spinner-wrap { text-align:center;padding:4rem;color:var(--muted); }
.spinner { display:inline-block;width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--cs);border-radius:50%;animation:spin .75s linear infinite;margin-bottom:12px; }
@keyframes spin { to { transform:rotate(360deg); } }
.err-box { background:#fffbeb;border:1px solid #fcd34d;border-radius:10px;padding:1.5rem;font-size:.875rem;color:#78350f;line-height:1.8; }
.err-box code { background:#fef3c7;padding:2px 6px;border-radius:4px;font-family:monospace; }
.section { margin-bottom:1.25rem; }

/* ═══ SNAPSHOT CLUSTERS (new top summary) ═══ */
.snapshot-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:.875rem;
  margin-bottom:1rem;
}
.snap-cluster {
  border-radius:var(--radius);
  padding:1rem 1.1rem .9rem;
  background:#fff;
  border:1px solid var(--border);
  box-shadow:none;
  border-left-width:3px;
}
.snap-cluster.cs-cl  { border-left-color:var(--cs); }
.snap-cluster.pp-cl  { border-left-color:var(--pp); }
.snap-cluster.sc-cl  { border-left-color:var(--sc); }
.snap-cluster.fin-cl { border-left-color:var(--warn); }
.snap-head { font-size:.72rem;font-weight:700;color:var(--muted);margin-bottom:.7rem;letter-spacing:.02em; }
.snap-metrics { display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:.5rem; }
.snap-metric { text-align:center; }
.snap-val { display:block;font-size:1.7rem;font-weight:800;line-height:1;letter-spacing:-.04em;color:var(--text); }
.snap-val.green { color:var(--win); }
.snap-val.red   { color:var(--los); }
.snap-val.amber { color:#d97706; }
.snap-val.muted { color:var(--muted); }
.snap-lbl { display:block;font-size:.6rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:600;margin-top:.25rem; }
.snap-note { font-size:.62rem;color:var(--subtle);margin-top:.6rem;border-top:1px solid var(--border2);padding-top:.45rem; }

/* ═══ AUDIT STRIP ═══ */
.audit-strip {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  background:#fff;
  border:1px solid var(--border);
  border-left:3px solid var(--pp);
  border-radius:var(--radius);
  overflow:hidden;margin-bottom:1.25rem;
}
.audit-cell { padding:.75rem 1rem;border-right:1px solid var(--border2);text-align:center; }
.audit-cell:last-child { border-right:none; }
.audit-lbl { font-size:.58rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:700;margin-bottom:.3rem; }
.audit-num { font-size:1.5rem;font-weight:800;color:var(--text);line-height:1;margin-bottom:.2rem;letter-spacing:-.03em; }
.audit-sub { font-size:.66rem;color:var(--muted); }

@media(max-width:1000px){
  .teams-grid{grid-template-columns:1fr;}
  .tab-nav{padding:0 1rem;overflow-x:auto;}
  .page{padding:1rem;}
  .period-strip{padding:.5rem 1rem;}
  .snapshot-grid{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:600px){
  .kpi-row{grid-template-columns:repeat(2,1fr);}
  .sum-bar{grid-template-columns:repeat(2,1fr);}
  .rep-card-stats{grid-template-columns:repeat(2,1fr);}
  .vol-grid{grid-template-columns:1fr 1fr;}
  .snapshot-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>
<div class="shell">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-brand">
      <div class="logo">AMS E-Commerce · Performance Dashboard · v4.0</div>
      <div class="title">📊 Team Performance</div>
    </div>

// ─── JSONP ───────────────────────────────────────────────────────────────────
function jsonpLoad(sheetId, opts) {
  return new Promise((resolve,reject)=>{
    const cb='__gs_cb_'+(++_cbIdx);
    const t=setTimeout(()=>{delete window[cb];document.getElementById(cb)?.remove();reject(new Error('Timeout'));},25000);
    window[cb]=function(resp){
      clearTimeout(t);delete window[cb];document.getElementById(cb)?.remove();
      if(!resp||!resp.table){reject(new Error('No table'));return;}
      resolve((resp.table.rows||[]).map(row=>(row.c||[]).map(c=>{
        if(!c) return '';
        return String((c.f!==undefined&&c.f!==null)?c.f:(c.v!==undefined&&c.v!==null)?c.v:'');
      })));
    };
    let url=`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json;responseHandler:${cb}`;
    if(opts.gid)   url+=`&gid=${opts.gid}`;
    if(opts.sheet) url+=`&sheet=${encodeURIComponent(opts.sheet)}`;
    if(opts.tq)    url+=`&tq=${encodeURIComponent(opts.tq)}`;
    const s=document.createElement('script');
    s.id=cb;s.src=url;
    s.onerror=()=>{clearTimeout(t);delete window[cb];reject(new Error('Load failed'));};
    document.head.appendChild(s);
  });
}

// ─── DATE HELPERS ────────────────────────────────────────────────────────────
const MON_MAP={jan:1,january:1,feb:2,february:2,mar:3,march:3,apr:4,april:4,may:5,
               jun:6,june:6,jul:7,july:7,aug:8,august:8,sep:9,september:9,
               oct:10,october:10,nov:11,november:11,dec:12,december:12};
const DN =['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DS =['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MN =['','January','February','March','April','May','June','July','August','September','October','November','December'];
const MS =['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function dateKey(str){
  if(!str) return null;
  const m=str.match(/([A-Za-z]+)\s+(\d{1,2})/);
  if(!m) return null;
  const mo=MON_MAP[m[1].toLowerCase()];
  return mo?`${mo}-${parseInt(m[2])}`:null;
}
function dk2date(dk){const[mo,dy]=dk.split('-').map(Number);return new Date(2026,mo-1,dy);}
function dk2full(dk){const d=dk2date(dk);const[mo,dy]=dk.split('-').map(Number);return `${DN[d.getDay()]}, ${MN[mo]} ${dy}, 2026`;}
function dk2short(dk){const d=dk2date(dk);const[mo,dy]=dk.split('-').map(Number);return `${DS[d.getDay()]} ${MS[mo]} ${dy}`;}
function sortDK(a,b){const[am,ad]=a.split('-').map(Number),[bm,bd]=b.split('-').map(Number);return am!==bm?am-bm:ad-bd;}
function weekBounds(dk){
  const d=dk2date(dk),dow=d.getDay(),diff=dow===0?6:dow-1;
  const mon=new Date(d.getTime()-diff*86400000);
  const sun=new Date(mon.getTime()+6*86400000);
  const monKey=`${mon.getMonth()+1}-${mon.getDate()}`;
  const fmt=x=>`${MS[x.getMonth()+1]} ${x.getDate()}`;
  return{monKey,label:`${fmt(mon)} – ${fmt(sun)}, 2026`};
}

  // HARDCODED confirmed column positions for CS/PDM/SCM Overall SC tab (verified 2026-07-13

  // A(0)=Date  B(1)=Name  C(2)=Total Hours Logged  D(3)=Total Emails/Cases Handled

  // I(8)–O(14) = the 7 shift-slot schedule columns, see SCHEDULE_SLOT_LABELS above.
  SCORE_COLS={ date:0, name:1, hours:2, emails:3, target:4, pct:5, quality:6, adminHours:7,
               sched:[8,9,10,11,12,13,14] };
}

function scoreDateKey(str){
  // Scorecard dates: "Monday, June 28 " → "6-28"
  if(!str) return null;
  const m=str.match(/([A-Za-z]+)[,\s]+(\d{1,2})\b/g);
  // Find "MonthName day" pattern
  const full=str.match(/\b(Jan(?:uary)?|Feb(?:ruary)?|Mar(?:ch)?|Apr(?:il)?|May|Jun(?:e)?|Jul(?:y)?|Aug(?:ust)?|Sep(?:tember)?|Oct(?:ober)?|Nov(?:ember)?|Dec(?:ember)?)\s+(\d{1,2})\b/i);
  if(full){const mo=MON_MAP[full[1].toLowerCase().slice(0,3)];const dy=+full[2];if(mo&&dy)return `${mo}-${dy}`;}
  return dateKey(str);
}

function getRepScore(dk,repName,dataset){
  const src=dataset||DB.score;
  const lo=repName.toLowerCase();
  const getv=(row,col)=>{
    if(col===undefined||col<0) return '—';
    const v=(row[col]||'').trim();
    return (v.startsWith('#')||v==='') ? '—' : v;
  };
  // A row "has data" if at least emails or hours has a real value
  // (prevents empty placeholder rows from blocking the fallback)
  const hasData=row=>getv(row,SCORE_COLS.emails)!=='—'||getv(row,SCORE_COLS.hours)!=='—';

  // First: exact date + name match that also has real data
  const allForName=src.filter(r=>(r[SCORE_COLS.name]||'').toLowerCase().includes(lo));
  let row=allForName.find(r=>(anyDateKey(r[SCORE_COLS.date])||scoreDateKey(r[SCORE_COLS.date]))===dk&&hasData(r));

  // Fallback: most recent row with this name that has real data
  if(!row){
    const withData=allForName.filter(hasData);
    row=withData[withData.length-1]||null;
  }
  if(!row) return null;
  return{
    emails:getv(row,SCORE_COLS.emails),
    target:getv(row,SCORE_COLS.target),
    pct:getv(row,SCORE_COLS.pct),
    hours:getv(row,SCORE_COLS.hours),
    quality:getv(row,SCORE_COLS.quality),
    adminHours:getv(row,SCORE_COLS.adminHours)
  };
}

// getRepScoreExact — strict version with NO fallback; returns null if exact date not found
// Used for weekly aggregation to avoid double-counting stale fallback data
function getRepScoreExact(dk,repName){
  const lo=repName.toLowerCase();
  const row=DB.score.find(r=>{
    const hasDate=dk?(scoreDateKey(r[SCORE_COLS.date])===dk):true;
    return hasDate&&(r[SCORE_COLS.name]||'').toLowerCase().includes(lo);
  });
  if(!row) return null;
  const get=col=>{
    if(col===undefined||col<0) return null;
    const v=(row[col]||'').trim();
    return (v.startsWith('#')||v==='') ? null : v;
  };
  return{emails:get(SCORE_COLS.emails),target:get(SCORE_COLS.target),pct:get(SCORE_COLS.pct),hours:get(SCORE_COLS.hours),quality:get(SCORE_COLS.quality),adminHours:get(SCORE_COLS.adminHours)};
}

// Sum of King+Patrick+Gabby's Admin Hours Logged (Col H) for a single date — powers the CS
// "Admin Hours" chip on the Daily tab.
function csAdminHoursForDate(dk){
  if(!dk||SCORE_COLS.adminHours===undefined) return 0;
  let sum=0;
  ['King','Patrick','Gabby'].forEach(name=>{
    const lo=name.toLowerCase();
    const row=DB.score.find(r=>(anyDateKey(r[SCORE_COLS.date])||scoreDateKey(r[SCORE_COLS.date]))===dk&&(r[SCORE_COLS.name]||'').toLowerCase().includes(lo));
    if(row){const v=parseFloat((row[SCORE_COLS.adminHours]||'').toString().replace(/,/g,''));if(!isNaN(v))sum+=v;}
  });
  return sum;
}

// ─── REFUND HELPERS ──────────────────────────────────────────────────────────
// Confirmed column layout from debug output:
// REFUNDS/PP_REF: col5=ProcessingDate(DD-MM-YYYY), col7=Reason, col10=RefundAmount
// CANCEL:         col9=CompletionDate(DD-MM-YYYY),  col6=Reason, col11=OrderValue

// Audit data helper — count rows and get avg rate for a date
// countColIdx: index of the column to check for non-empty (use -1 to just count matched rows)
// rateColIdx: index of the rate column
function auditData(rows, dk, countColIdx, rateColIdx){
  // Fill-down date: many audit sheets only put the date in the FIRST row of each day's
  // batch. Subsequent rows for that same day have an empty Col A. We carry the last
  // seen date forward so every row in the batch is counted correctly.
  let lastDk=null;
  const tagged=rows.map(r=>{
    const raw=(r[0]||'').trim();
    if(raw){
      const parsed=anyDateKey(raw)||dateKey(raw)||null;
      if(parsed) lastDk=parsed;
    }
    return{r, dk:lastDk};
  });
  const matched=tagged.filter(t=>t.dk===dk).map(t=>t.r);
  // Count rows where countColIdx column is non-empty (store name / order number present)
  // countColIdx=-1 means count all matched rows
  const count=countColIdx<0
    ?matched.length
    :matched.filter(r=>(r[countColIdx]||'').trim().length>0).length;
  const rates=matched.map(r=>parseFloat((r[rateColIdx]||'').replace(/[%,\s]/g,''))).filter(v=>!isNaN(v)&&v>0);
  const avgRate=rates.length?(rates.reduce((s,v)=>s+v,0)/rates.length):null;
  return{count, rate:avgRate!==null?Number(avgRate).toFixed(2):null};
}

function parseCurrency(s){
  if(!s) return 0;
  const m=String(s).replace(/[€$£,\s]/g,'').match(/[\d.]+/);
  return m?parseFloat(m[0]):0;
}

// Universal date key parser — handles every format Google Sheets JSONP might return
// Returns "month-day" key (e.g. "6-27") or null
function anyDateKey(str){
  if(!str) return null;
  const s=String(str).trim();

  // "Date(2026,5,27)" — raw c.v (0-indexed month)
  let m=s.match(/^Date\((\d{4}),(\d{1,2}),(\d{1,2})\)$/);
  if(m) return `${parseInt(m[2])+1}-${parseInt(m[3])}`;

  // "27-06-2026" / "27/06/2026" / "6/27/2026" — numeric date with separators
  m=s.match(/^(\d{1,2})[\-\/](\d{1,2})[\-\/](\d{2,4})$/);
  if(m){
    const d1=parseInt(m[1]),d2=parseInt(m[2]);
    // d1 > 12 → must be day (DD-MM-YYYY format)
    if(d1>12) return `${d2}-${d1}`;
    // d2 > 12 → must be day (MM-DD-YYYY / US format)
    if(d2>12) return `${d1}-${d2}`;
    // Ambiguous (both ≤ 12): assume DD-MM-YYYY (European, as used in these sheets)
    return `${d2}-${d1}`;
  }

  // "2026-06-27" — ISO format (YYYY-MM-DD)
  m=s.match(/^(\d{4})[\-\/](\d{1,2})[\-\/](\d{1,2})$/);
  if(m) return `${parseInt(m[2])}-${parseInt(m[3])}`;

  // "Jun 27, 2026" / "Mon, Jun 27, 2026" / "June 27" — name-based formats
  m=s.match(/([A-Za-z]{3,})\s+(\d{1,2})/);
  if(m){const mo=MON_MAP[m[1].toLowerCase()];if(mo) return `${mo}-${parseInt(m[2])}`;}

  return null;
}

// Sum refund amounts — after TQ select, r[0]=date r[2]=amount
function refundForDate(rows, dk){
  let total=0;
  rows.forEach(r=>{
    const rdk=anyDateKey(r[0])||dateKey(r[0])||scoreDateKey(r[0]);
    if(rdk===dk) total+=parseCurrency(r[2]);
  });
  return total;
}

// Count cancellation rows — after TQ select, r[0]=date r[2]=orderValue
function cancelForDate(rows, dk){
  const matched=rows.filter(r=>(anyDateKey(r[0])||dateKey(r[0])||scoreDateKey(r[0]))===dk);
  const value=matched.reduce((s,r)=>s+parseCurrency(r[2]),0);
  return{count:matched.length, value};
}

// Top N reasons — after TQ select, r[0]=date r[1]=reason (same for both refunds and cancel)
function topReasons(rows, dk, reasonCol, isCancel=false, n=3){
  const dateFn = r=>anyDateKey(r[0])||dateKey(r[0])||scoreDateKey(r[0]);
  const matched=rows.filter(r=>dateFn(r)===dk);
  if(!matched.length) return[];
  const freq={};
  matched.forEach(r=>{
    const v=(r[reasonCol]||'').trim();
    if(v) freq[v]=(freq[v]||0)+1;
  });
  return Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,n).map(([reason,cnt])=>({reason,cnt}));
}

function buildPeriods(dataDates){
  const wm=new Map();
  DATES.forEach(({k})=>{
    const{monKey,label}=weekBounds(k);
    if(!wm.has(monKey))wm.set(monKey,{key:monKey,label,dates:[]});
    wm.get(monKey).dates.push(k);
  });
  WEEKS=[...wm.values()].sort((a,b)=>sortDK(a.key,b.key));
  const mm=new Map();
  // MONTHS built from real-data dates only (no future placeholders)
  const _mdates=dataDates&&dataDates.length?dataDates:DATES;
  _mdates.forEach(({k})=>{
    const mo=+k.split('-')[0];
    if(!mm.has(mo))mm.set(mo,{key:mo,label:`${MN[mo]} 2026`,dates:[]});
    mm.get(mo).dates.push(k);
  });
  MONTHS=[...mm.values()].sort((a,b)=>a.key-b.key);
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
function isOff(s){return(s||'').trim().toUpperCase()==='OFF';}
function isNone(s){const lo=(s||'').toLowerCase().trim();return!lo||lo.includes('no challenge')||lo.includes('no unusual')||lo==='none'||lo==='n/a';}
function n(v){return parseInt((v||'0').replace(/,/g,'').trim())||0;}
function pf(v){return parseFloat((v||'0').replace(/[%,]/g,'').trim())||0;}

// ── Weekly/monthly narrative consolidation helpers (added 2026-07-09, revised 2026-07-10) ──
// Goal: turn "one card per day-row" EOD text into a consolidated insight —
// a routine-day count plus a deduped list of genuinely distinct items —
// instead of listing every day's entry separately.
function normTxt(s){return (s||'').trim().replace(/\s+/g,' ');}

// ── v2 model: default to ROUTINE, require a positive "notable" signal to surface as a bullet. ──
// Free-text EOD narratives phrase "nothing unusual happened" in too many ways to whitelist
// ("shift went smoothly", "handled promptly", "in accordance with SOP", etc.) — trying to catch
// every routine phrasing was a losing game. Instead we look for signals that something SPECIFIC
// happened: an order/case number, a ticket URL, or an escalation-type keyword. Anything without
// one of those signals is almost always a restatement of "normal day" and gets rolled into the count.
function looksNotable(s){
  const t=normTxt(s);
  if(!t) return false;
  if(/#\s?\d{2,}/.test(t)) return true;                 // case/order number, e.g. "#3974"
  if(/\border\s*#?\s*\d+/i.test(t)) return true;         // "Order 12345"
  if(/https?:\/\//i.test(t)) return true;                // ticket link
  // Escalation/conflict signals only — deliberately excludes generic category words like
  // "damage", "wrong item", "refund" since those show up constantly as routine category
  // mentions ("...inquiries about shipping, returns, and damage/replacement requests")
  // and would falsely flag an ordinary day-recap sentence as notable.
  if(/escalat|complain|\bdispute(d|s)?\b|chargeback|\burgent\b|\bfraud\b|legal action|lawsuit|\bangry\b|frustrat|reported.{0,30}(jewel|ravish|yvonne|flora|veronica)|raised.{0,20}(jewel|ravish|yvonne|flora|veronica)|checked with (jewel|ravish)/i.test(t)) return true;
  return false;
}
// Consolidate free-text narrative (Challenges/Situations): routine by default, notable bullets
// only for entries carrying a specific signal (order #, link, escalation keyword).
function consolidateNotable(texts){
  let routineCount=0,total=0;
  const map=new Map();
  (texts||[]).forEach(raw0=>{
    const raw=normTxt(raw0);
    if(!raw) return;
    total++;
    if(isNone(raw)||!looksNotable(raw)){routineCount++;return;}
    const key=raw.toLowerCase();
    if(!map.has(key)) map.set(key,{text:raw,count:0});
    map.get(key).count++;
  });
  return {routineCount,total,notable:[...map.values()].sort((a,b)=>b.count-a.count)};
}
// Known boilerplate action phrases (SOP confirmations with no extra detail)
const _BOILERPLATE_ACTIONS=['followed standard procedure','followed the standard procedure','followed standard operating procedure','followed standard operating procedures','followed sop','all concerns were handled in accordance with standard operating procedures'];
// Broader boilerplate detection (fixed 2026-07-13): the exact-match list above only caught a
// handful of fixed phrases, but real EOD entries phrase "nothing unusual, SOP followed" dozens of
// slightly different ways — "All emails were addressed in accordance with the established SOPs",
// "All inquiries were handled promptly in accordance with our standard support procedures", etc.
// Each of those was landing as its own "distinct" notable action (usually count=1 each), cluttering
// the Actions Taken summary with a wall of near-identical boilerplate. Now: any entry that mentions
// SOP/standard procedure AND has no other specific signal (a named person/team or a concrete action
// word like "escalated"/"discount"/"tracking") is treated as routine instead.
const _SOP_MENTION_RE=/\b(sops?|standard\s+(operating\s+|support\s+)?procedures?)\b/i;
const _ACTION_SIGNAL_RE=/\b(jewel|ravish|yvonne|flora|veronica|scm|courier|supplier|warehouse|escalat\w*|discount\w*|replace(d|ment)?|refund\w*|assist\w*|tracking|complain\w*|dispute\w*|chargeback|urgent|fraud)\b/i;
function isBoilerplateAction(s){
  const norm=normTxt(s);
  const lo=norm.toLowerCase().replace(/\.+$/,'').trim();
  if(_BOILERPLATE_ACTIONS.includes(lo)) return true;
  if(_SOP_MENTION_RE.test(norm)&&!_ACTION_SIGNAL_RE.test(norm)) return true;
  return false;
}
// Consolidate Actions Taken: notable BY DEFAULT (actions tend to be short/specific already),
// routine only when it's an exact match to a known generic SOP-confirmation phrase, or matches
// the broader SOP-mention-with-no-other-signal heuristic above.
function consolidateTexts(texts,{extraRoutineFn=null}={}){
  let routineCount=0,total=0;
  const map=new Map();
  (texts||[]).forEach(raw0=>{
    const raw=normTxt(raw0);
    if(!raw) return;
    total++;
    const routine=isNone(raw)||(extraRoutineFn&&extraRoutineFn(raw));
    if(routine){routineCount++;return;}
    const key=raw.toLowerCase();
    if(!map.has(key)) map.set(key,{text:raw,count:0});
    map.get(key).count++;
  });
  return {routineCount,total,notable:[...map.values()].sort((a,b)=>b.count-a.count)};
}
// ── Fixed keyword taxonomy for categorizing challenge/situation themes (CS + SC) ──
const _THEME_TAXONOMY=[
  {label:'Address / House Number Verification', re:/address|house number/i},
  {label:'Shipping Delay / Tracking Issue', re:/tracking|no movement|not (yet )?shipped|still not shipped|parcel panel|\bdelay/i,},
  {label:'Proof of Delivery Issue', re:/proof of delivery|\bPOD\b/i},
  {label:'Returns', re:/\breturn/i},
  {label:'Cancellations', re:/cancel/i},
  {label:'Damage / Replacement', re:/damag|replace|wrong item|incorrect (item|color)/i},
  {label:'Color / Size Change', re:/\bcolor\b|\bsize\b/i},
  {label:'PayPal Threat / Dispute', re:/paypal threat|dispute|chargeback/i},
  {label:'Order Modification', re:/order detail|remove.{0,15}item|change.{0,15}order/i},
  {label:'Website / Discount / Currency Issue', re:/discount code|currency|website/i},
  {label:'Refund Request', re:/refund/i},
  {label:'Product / Policy Feedback', re:/quality|feedback|\bpolicy\b/i},
];
function themeCategorize(text){
  const hits=_THEME_TAXONOMY.filter(t=>t.re.test(text)).map(t=>t.label);
  return hits.length?hits:['General / Other'];
}
function categoryFrequency(texts){
  const freq=new Map();
  (texts||[]).forEach(raw=>{
    const t=normTxt(raw);
    if(!t||isNone(t)) return;
    themeCategorize(t).forEach(label=>{
      if(!freq.has(label)) freq.set(label,{text:label,count:0});
      freq.get(label).count++;
    });
  });
  return [...freq.values()].sort((a,b)=>b.count-a.count);
}

// Frequency count of individual themes inside bullet/newline-separated fields (e.g. Email Drivers)
function themeFrequencyTexts(texts){

}
// Render a consolidated block: routine-count line + deduped notable bullets (capped, with "+N more")
function renderConsolidatedBlock(title,icon,colorClass,data,{emptyText='Nothing notable this period.',routineNoun='day-entries reported no unusual issues'}={}){
  let out=`<div class="eod-section"><div class="eod-title">${icon} ${title}</div>`;
  if(data.total===0){
    out+=`<div class="eod-card green">${emptyText}</div>`;
  } else {
    if(data.routineCount>0){
      out+=`<div class="eod-card green" style="margin-bottom:.35rem">✅ ${data.routineCount} of ${data.total} ${routineNoun} — standard procedure followed.</div>`;
    }
    if(!data.notable.length&&data.routineCount===0){
      out+=`<div class="eod-card green">${emptyText}</div>`;
    }
    data.notable.slice(0,10).forEach(item=>{
      out+=`<div class="eod-card ${colorClass}" style="margin-bottom:.35rem">${esc(item.text)}${item.count>1?` <span style="font-weight:700;color:var(--muted);font-size:.7rem">(&times;${item.count})</span>`:''}</div>`;
    });
    if(data.notable.length>10){
      out+=`<div style="font-size:.7rem;color:var(--muted);font-style:italic;margin-top:.2rem">+ ${data.notable.length-10} more similar item${data.notable.length-10!==1?'s':''}</div>`;
    }
  }
  out+='</div>';
  return out;
}
// Combines "flagged situations" + "actions taken" into ONE summarized "Actions Taken" section
// (per request 2026-07-13) instead of two separate raw-dump lists (Flagged Cases + Actions Taken).
// Produces a short narrative synthesizing what came up + what the team did about it, followed by
// the distinct actions actually taken (deduplicated) rather than every individual case card.
function renderActionsSummary(chData,acData,opts){
  opts=opts||{};
  const label=opts.label||'The team';
  let out=`<div class="eod-section"><div class="eod-title">⚡ Actions Taken</div>`;
  const chTotal=chData.total,chFlagged=chData.notable.length,chRoutine=chData.routineCount;
  const acNotable=acData.notable,acRoutine=acData.routineCount;

  if(chTotal===0&&acData.total===0){
    out+=`<div class="eod-card green">No challenges or actions logged this week.</div></div>`;
    return out;
  }

  const sentences=[];
  if(chFlagged>0){
    sentences.push(`${label} flagged <strong>${chFlagged}</strong> distinct situation${chFlagged!==1?'s':''} this week`+(chRoutine>0?`, while <strong>${chRoutine}</strong> of ${chTotal} day-entries were routine and required no special handling`:'')+'.');
  } else if(chRoutine>0){
    sentences.push(`No unusual situations were flagged this week — all ${chRoutine} day-entries followed routine handling.`);
  }
  if(acNotable.length>0){
    sentences.push(`In response, ${label.toLowerCase().startsWith('the')?label.charAt(0).toLowerCase()+label.slice(1):label} logged <strong>${acNotable.length}</strong> distinct corrective action${acNotable.length!==1?'s':''}`+(acRoutine>0?`, with <strong>${acRoutine}</strong> case${acRoutine!==1?'s':''} resolved via standard procedure`:'')+'.');
  } else if(acRoutine>0){
    sentences.push(`All ${acRoutine} action entries followed standard procedure — no unique interventions were required.`);
  }
  if(!sentences.length) sentences.push('No specific cases or actions were logged this week.');
  out+=`<div style="font-size:.82rem;line-height:1.65;color:#334155;margin-bottom:${acNotable.length?'.65rem':'0'}">${sentences.join(' ')}</div>`;

  if(acNotable.length){
    acNotable.slice(0,6).forEach(item=>{
      out+=`<div class="eod-card green" style="margin-bottom:.35rem">${esc(item.text)}${item.count>1?` <span style="font-weight:700;color:var(--muted);font-size:.7rem">(&times;${item.count})</span>`:''}</div>`;
    });
    if(acNotable.length>6){
      out+=`<div style="font-size:.7rem;color:var(--muted);font-style:italic;margin-top:.2rem">+ ${acNotable.length-6} more similar action${acNotable.length-6!==1?'s':''}</div>`;
    }
  }
  out+='</div>';
  return out;
}

// ── Daily vs-yesterday comparison helpers (team-box header badges) ──
function dailyKeyTotals(dk){
  const _hRows=DB.hours.filter(r=>anyDateKey(r[0])===dk||dateKey(r[0])===dk);
  const _cs=_hRows.reduce((s,r)=>s+(parseFloat((r[2]||'').replace(/,/g,''))||0),0);
  const _pm=ppMain(dk);
  const pp=_pm&&(_pm[8]||'').trim()!==''?n(_pm[8]):null;

  const sc=_sc?n(_sc[7]):null;
  return{cs:_cs||null,pp,sc};
}
function prevDayKey(dk){const d=dk2date(dk);d.setDate(d.getDate()-1);return`${d.getMonth()+1}-${d.getDate()}`;}
function miniDelta(cur,prev,higher='good'){
  if(cur===null||cur===undefined||prev===null||prev===undefined||isNaN(cur)||isNaN(prev))return'';
  const d=cur-prev;
  if(d===0)return`<div style="font-size:.62rem;font-weight:700;margin-top:.25rem;opacity:.75;color:#fff">&#8594; same as yesterday</div>`;
  const good=(higher==='good'&&d>0)||(higher==='bad'&&d<0);
  const clr=good?'#86efac':'#fca5a5';
  return`<div style="font-size:.62rem;font-weight:700;margin-top:.25rem;color:${clr}">${d>0?'&#9650;':'&#9660;'}${Math.abs(d)} vs yesterday (${prev})</div>`;
}
function ppMain(dk){
  // Get all rows for this date that are not "On Leave" placeholder rows
  const dated=DB.pp.filter(r=>(dateKey(r[0])===dk||anyDateKey(r[0])===dk)
    && (r[1]||'').toUpperCase()!=='ON LEAVE');
  if(!dated.length) return null;
  // Among matching rows, pick the one with the highest data sum across key columns
  // (F=5,G=6,H=7,I=8,J=9,K=10,L=11,M=12,N=13) — avoids grabbing empty/partial rows
  const rowScore=r=>[5,6,7,8,9,10,11,12,13].reduce((s,i)=>s+n(r[i]),0);
  dated.sort((a,b)=>rowScore(b)-rowScore(a));
  return dated[0];
}
function scMain(dk){return DB.sc.filter(r=>dateKey(r[0])===dk||anyDateKey(r[0])===dk)[0];}

// Parse Col Q summary text: "Claim: 5\nInquiry: 2\nTotal: 7"
function parseColQ(text){
  if(!text) return{claims:null,inquiries:null,total:null};
  const s=String(text);
  const clm=s.match(/claim[s]?\s*[:\-]\s*(\d+)/i);
  const inq=s.match(/inquir(?:y|ies)\s*[:\-]\s*(\d+)/i);
  const tot=s.match(/total\s*[:\-]\s*(\d+)/i);
  return{
    claims: clm?parseInt(clm[1]):null,
    inquiries: inq?parseInt(inq[1]):null,
    total: tot?parseInt(tot[1]):null
  };
}

function parseThreats(txt){
  const g=pct=>{const m=(txt||'').match(new RegExp(pct.replace('%','\\%')+'\\s*[–\\-]\\s*(\\d+)'));return m?m[1]:'–';};
  const r=(txt||'').match(/Opted to Return\s*[–\-]\s*(\d+)/i);
  return{'40%':g('40%'),'60%':g('60%'),'75%':g('75%'),'90%':g('90%'),'100%':g('100%'),'Return':r?r[1]:'–'};
}
function aggPP(dates){
  let o={newInq:0,newClaim:0,esc:0,totNew:0,inqWin:0,claimWin:0,inqLost:0,claimLost:0,totClosed:0};
  dates.forEach(dk=>{const pm=ppMain(dk);if(pm){o.newInq+=n(pm[5]);o.newClaim+=n(pm[6]);o.esc+=n(pm[7]);o.totNew+=n(pm[8]);o.inqWin+=n(pm[9]);o.claimWin+=n(pm[10]);o.inqLost+=n(pm[11]);o.claimLost+=n(pm[12]);o.totClosed+=n(pm[13]);}});
  o.winRate=o.totClosed>0?Math.round((o.inqWin+o.claimWin)/o.totClosed*100):0;
  return o;
}
function aggSC(dates){

  dates.slice().sort(sortDK).forEach(dk=>{const sc=scMain(dk);if(sc&&!isOff(sc[1])){o.addr+=n(sc[3]);o.del+=n(sc[4]);o.damA+=n(sc[5]);o.damD+=n(sc[6]);o.totNew+=n(sc[7]);o.closed+=n(sc[8]);o.pending=n(sc[9]);}});

}
// ── Customer Service aggregate — used by the Comparison tab (added 2026-07-20) ──
// Mirrors the CS emails/refunds/cancellations math already inlined in renderWeekly().
function aggCS(dates){
  const hoursRows=DB.hours.filter(r=>dates.some(dk=>anyDateKey(r[0])===dk||dateKey(r[0])===dk));
  const hoursEmails=hoursRows.reduce((s,r)=>s+(parseFloat((r[2]||'').replace(/,/g,''))||0),0);
  const scoreEmails=(()=>{let e=0;DB.score.forEach(r=>{if(SCORE_COLS.date===undefined)return;const rdk=scoreDateKey(r[SCORE_COLS.date]);if(rdk&&dates.includes(rdk)&&(r[SCORE_COLS.name]||'').trim()){const v=parseFloat((r[SCORE_COLS.emails]||'').toString().replace(/,/g,''));if(!isNaN(v))e+=v;}});return e;})();
  const emails=hoursEmails||scoreEmails;
  const manualRefund=dates.reduce((s,dk)=>s+refundForDate(DB.refunds,dk),0);

// ═══════════════════════════════════════════════════════════
// PP DISPUTES HELPER — win/loss/ongoing from management sheet
// ═══════════════════════════════════════════════════════════
function calcPPDisputes(dates, filterYear){
  // dates: array of "M-D" keys (e.g. ["6-23","6-24"]) OR null for all-time
  // filterYear: number (e.g. 2026) to exclude same month rows from other years
  // r[0]=store(A), r[1]=dateLodged(B), r[2]=dateResolved(I), r[3]=disputeType(J), r[4]=reason(K), r[5]=status(M)
  // ── WIN statuses (Column M) ──────────────────────────────────────────────
  const WIN_STATUS=[
    "we've decided the case in your favor",
    "case closed - offer accepted",
    "case closed – offer accepted",
    "case closed - voluntarily",
    "case closed – voluntarily",
    "case closed - voluntary",
    "case closed – voluntary",
    "automatic close",
    "automatic closed",
  ];
  // ── LOST statuses ────────────────────────────────────────────────────────
  const LOST_STATUS=[
    "case closed x",
    "case closed ❌",
    "case closed in buyer's favor",
    "case closed - buyer's favor",
    "case closed – buyer's favor",
  ];
  // ── ONGOING / IN-PROGRESS statuses ───────────────────────────────────────
  const ONGOING_STATUS=[
    "in progress",
    "awaiting paypal",
  ];

  // Helper: does a date string fall within the requested dates/year?
  const inPeriod=(dateStr,useDates)=>{
    if(!useDates) return true;
    const dk=anyDateKey(dateStr)||dateKey(dateStr);
    if(!dk||!useDates.includes(dk)) return false;
    if(filterYear!=null){const yr=_extractYear(dateStr);if(yr!=null&&yr!==filterYear)return false;}
    return true;
  };

  // Main pool: cases LODGED in the period (Col B) — used for total, lost, ongoing, byType, byReason
  const rows=DB.ppDisputes.filter(r=>inPeriod(r[1],dates));

  let total=0,won=0,lost=0,ongoing=0;
  const byType={};    // {type: {total,won,lost,ongoing}}
  const byReason={};  // {reason: {total,won,lost}}

  rows.forEach(r=>{
    const status=(r[5]||'').trim().toLowerCase();
    const type=(r[3]||'').trim()||'Unknown';
    const reason=(r[4]||'').trim()||'Unknown';
    total++;

    const isWon   = WIN_STATUS.some(s=>status.includes(s));
    const isLost  = LOST_STATUS.some(s=>status.includes(s));
    const isOngoing= ONGOING_STATUS.some(s=>status.includes(s));

    if(isWon)  won++;
    else if(isLost) lost++;
    else if(isOngoing) ongoing++;
    // else: unknown/other — counted in total only

    if(!byType[type])  byType[type]={total:0,won:0,lost:0,ongoing:0};
    byType[type].total++;
    if(isWon)    byType[type].won++;
    if(isLost)   byType[type].lost++;
    if(isOngoing)byType[type].ongoing++;

    if(!byReason[reason])byReason[reason]={total:0,won:0,lost:0};
    byReason[reason].total++;
    if(isWon)  byReason[reason].won++;
    if(isLost) byReason[reason].lost++;
  });

  // wonByResolved: cases WON in the period based on RESOLUTION date (Col I) — used for incentive
  const _wonRows=DB.ppDisputes.filter(r=>{
    const status=(r[5]||'').trim().toLowerCase();
    if(!WIN_STATUS.some(s=>status.includes(s))) return false;
    return inPeriod(r[2],dates); // Col I = dateResolved
  });
  const wonByResolved=_wonRows.length;
  if(dates){
    // Debug: log Col I values so we can verify the date format is parsing correctly
    const _allWins=DB.ppDisputes.filter(r=>WIN_STATUS.some(s=>(r[5]||'').toLowerCase().includes(s)));
    console.log(`[PP wonByResolved] period=${dates[0]}…${dates[dates.length-1]} | wonByResolved=${wonByResolved} | total win rows in sheet=${_allWins.length}`);
    console.log('[PP wonByResolved] Col I samples (all wins):',_allWins.slice(0,15).map(r=>`"${r[2]}" → ${anyDateKey(r[2])||dateKey(r[2])||'UNPARSED'}`).join(' | '));
    console.log('[PP wonByResolved] Matched wins this period:',_wonRows.map(r=>`lodged="${r[1]}" resolved="${r[2]}"`).join(' | ')||'(none)');
  }

  const closed=won+lost;
  const winRate=closed>0?Math.round(won/closed*100):null;
  const lossRate=closed>0?Math.round(lost/closed*100):null;

  return{total,won,lost,ongoing,closed,winRate,lossRate,byType,byReason,wonByResolved};
}

// WEEKLY REPORT
// ═══════════════════════════════════════════════════════════
function renderWeekly(wKey,cmpWKey){
  if(cmpWKey&&cmpWKey!==wKey){
    const w1=WEEKS.find(w=>w.key===wKey),w2=WEEKS.find(w=>w.key===cmpWKey);
    if(w1&&w2){document.getElementById('dash').innerHTML=renderWeeklyComparison(w1,w2);return;}
  }
  const week=WEEKS.find(w=>w.key===wKey);
  if(!week){document.getElementById('dash').innerHTML='<div class="no-data">No data for this week.</div>';return;}
  const dates=week.dates.slice().sort(sortDK);
  const pp=aggPP(dates),sc=aggSC(dates);

  // ── Weekly CS hours/emails from Hours tab ──
  const weekHoursRows=DB.hours.filter(r=>dates.some(dk=>anyDateKey(r[0])===dk||dateKey(r[0])===dk));
  const hoursEmails=weekHoursRows.reduce((s,r)=>s+(parseFloat((r[2]||'').replace(/,/g,''))||0),0);
  const totalCsHours=weekHoursRows.reduce((s,r)=>s+(parseFloat((r[1]||'').replace(/,/g,''))||0),0);
  // Fall back to score-sheet sum when hours sheet has no rows for this week
  const scoreEmails=(()=>{let e=0;DB.score.forEach(r=>{if(SCORE_COLS.date===undefined)return;const rdk=scoreDateKey(r[SCORE_COLS.date]);if(rdk&&dates.includes(rdk)&&(r[SCORE_COLS.name]||'').trim()){const v=parseFloat((r[SCORE_COLS.emails]||'').toString().replace(/,/g,''));if(!isNaN(v))e+=v;}});return e;})();
  const totalCsEmails=hoursEmails||scoreEmails;

  // ── Per-rep weekly scorecard aggregate ──
  const weekScore=(repName,dataset)=>{
    const src=dataset||DB.score;const lo=repName.toLowerCase();
    let emails=0,hours=0,target=0,adminHours=0,qualVals=[];
    dates.forEach(dk=>{
      if(SCORE_COLS.date===undefined)return;
      const row=src.find(r=>(anyDateKey(r[SCORE_COLS.date])||scoreDateKey(r[SCORE_COLS.date]))===dk&&(r[SCORE_COLS.name]||'').toLowerCase().includes(lo));
      if(!row)return;
      const e=pf(row[SCORE_COLS.emails]),h=pf(row[SCORE_COLS.hours]),q=pf(row[SCORE_COLS.quality]),t=pf(row[SCORE_COLS.target]),ah=pf(row[SCORE_COLS.adminHours]);
      emails+=e;hours+=h;target+=t;adminHours+=ah;if(q>0)qualVals.push(q);
    });
    const avgQ=qualVals.length?(qualVals.reduce((s,v)=>s+v,0)/qualVals.length):null;
    return{emails:emails||null,hours:hours?hours.toFixed(1):null,quality:avgQ!==null?avgQ.toFixed(1):null,target:target||null,adminHours:adminHours||null};
  };
  const mariaW=weekScore('Maria',DB.score);
  const veronicaW=weekScore('Veronica');
  // CS aggregate stats (King/Patrick/Gabby combined) — powers the Hours/Emails/Target%/Quality chip row
  const kingW=weekScore('King'),patrickW=weekScore('Patrick'),gabbyW=weekScore('Gabby');
  const csRepsW=[kingW,patrickW,gabbyW];
  const csTargetSum=csRepsW.reduce((s,r)=>s+(r.target||0),0);
  const csEmailsForTarget=csRepsW.reduce((s,r)=>s+(r.emails||0),0);
  const csTargetPctW=csTargetSum>0?Math.round(csEmailsForTarget/csTargetSum*100):null;
  const csQualValsW=csRepsW.map(r=>r.quality).filter(q=>q!==null).map(Number);
  const csAvgQualityW=csQualValsW.length?(csQualValsW.reduce((s,v)=>s+v,0)/csQualValsW.length).toFixed(1):null;
  const csAdminHoursW=csRepsW.reduce((s,r)=>s+(parseFloat(r.adminHours)||0),0);

  // ── Weekly audit totals ──
  // weekAudit: countCI=countColIdx, rateCI=rateColIdx (match the TQ column positions)
  const weekAudit=(auditArr,countCI,rateCI)=>{
    let count=0,rates=[];
    dates.forEach(dk=>{const ad=auditData(auditArr,dk,countCI,rateCI);count+=ad.count;if(ad.rate!==null)rates.push(Number(ad.rate));});
    return{count,rate:rates.length?(rates.reduce((s,v)=>s+v,0)/rates.length).toFixed(2):null};
  };
  const adKingW=weekAudit(DB.auditKing,1,2),adPatrickW=weekAudit(DB.auditPatrick,1,2),adGabbyW=weekAudit(DB.auditGabby,1,2);
  // Veronica: select B,C,M → count=r[1](ColC), quality=r[2](ColM)

// MONTHLY REPORT
// ═══════════════════════════════════════════════════════════
function renderWeeklyComparison(w1,w2){
  const pp1=aggPP(w1.dates),pp2=aggPP(w2.dates);
  const sc1=aggSC(w1.dates),sc2=aggSC(w2.dates);
  const delta=(a,b,higher='good')=>{const d=a-b;if(!isFinite(d)||d===0)return'';const good=(higher==='good'&&d>0)||(higher==='bad'&&d<0);return`<span style="color:${good?'var(--win)':'var(--los)'};font-size:.65rem;font-weight:700;margin-left:.3rem">${d>0?'▲':'▼'}${Math.abs(d)}</span>`;};
  const td=(v1,v2,cls='',higher='good')=>`<td class="nc ${cls}">${v1||'–'}</td><td class="nc ${cls}">${v2||'–'}</td><td class="nc" style="font-size:.75rem">${delta(+v1||0,+v2||0,higher)}</td>`;
  const rowH=`<tr><th style="min-width:190px">Metric</th><th class="dh">${w1.label}</th><th class="dh">${w2.label}</th><th class="dh">Δ</th></tr>`;
  return `
    <div style="background:#f5f3ff;border:1px solid #c4b5fd;border-radius:8px;padding:.75rem 1rem;margin-bottom:1rem">
      ⇌ <strong style="color:#4c1d95">Week of ${w1.label}</strong> vs <strong style="color:#4c1d95">Week of ${w2.label}</strong>
    </div>
    <div class="section"><div class="sh pp-s"><div class="sh-icon pp-s">⚖️</div><div class="sh-ttl">PayPal Disputes</div></div>
    <div class="tbl-wrap"><table class="ctbl"><thead>${rowH}</thead><tbody>

// ── Monthly Insights (added 2026-07-09) ──────────────────────────────────
// Implements the CS Monthly Incentive Scorecard rules from AMS-REFERENCE.md:
// Level 3 (Exceeding): quality>100 & target>100 → $100
// Level 2 (Meeting):   quality 95-100 & target 96-99 → $75
// Level 1 (Minimum):   quality 90-94.99 & target 90-95.99 → $50
// Not Meeting: either metric <90 → $0. Mismatched levels use the LOWER level.
function calcIncentiveLevel(q,pct){
  if(q==null||pct==null||isNaN(q)||isNaN(pct)) return null;
  const qLevel = q>100?3 : q>=95?2 : q>=90?1 : 0;
  const pLevel = pct>100?3 : pct>=96?2 : pct>=90?1 : 0;
  const level = Math.min(qLevel,pLevel);
  const dollarMap={0:0,1:50,2:75,3:100};
  const levelNames={0:'Not Meeting Target',1:'Minimum Target Met',2:'Meeting Target',3:'Exceeding Target'};
  return {level, levelName:levelNames[level], incentive:dollarMap[level]};
}

// Builds the "What Went Well / What Could Improve / Suggested Improvements" insight
// section for the Monthly tab. All inputs are the aggregates already computed for the
// SELECTED month (recomputed on every renderMonthly call), so insights always reflect
// whichever month/comparison the user has navigated to via the period dropdown.
function buildMonthlyInsights(ctx){
  const {month,allDates,kingM,patM,gabM,mpd,sc,moTotalRef,moCancel,csChalMo,monthWeeks}=ctx;
  // Bullets are grouped PER DEPARTMENT so wins/improvements for a team stay together and are
  // visually distinguishable by color, mirroring the department-card style used elsewhere.
  const cs=[], pp=[], scB=[], fin=[], suggestions=[];
  const win=t=>`<span style="color:var(--win);font-weight:700">✅</span> ${t}`;
  const warn=t=>`<span style="color:#d97706;font-weight:700">⚠️</span> ${t}`;

  // ── CS rep incentive scorecard ──
  [{name:'King',data:kingM},{name:'Patrick',data:patM},{name:'Gabby',data:gabM}].forEach(({name,data})=>{
    if(!data||data.pct==null||data.avgQ==null) return;
    const r=calcIncentiveLevel(data.avgQ,data.pct);
    if(!r) return;
    // Note: dollar/incentive amounts are intentionally NOT shown here (or anywhere outside the
    // password-gated Scorecard tab) — level/status only, per request 2026-07-15.
    if(r.level>=2){
      cs.push(win(`<strong>${name}</strong> hit <strong>${r.levelName}</strong> — ${data.avgQ}% quality, ${data.pct}% of target.`));
    } else if(r.level===1){
      cs.push(warn(`<strong>${name}</strong> landed at <strong>${r.levelName}</strong> (${data.avgQ}% quality, ${data.pct}% of target) — one tier below Meeting Target.`));
      suggestions.push(`Coach <strong>${name}</strong> (CS) toward the 95%+ quality / 96%+ target band to move up from Minimum to Meeting Target next month.`);
    } else {
      cs.push(warn(`<strong>${name}</strong> did not meet <strong>${r.levelName}</strong> (${data.avgQ}% quality, ${data.pct}% of target).`));
      suggestions.push(`Review <strong>${name}</strong>'s (CS) workload and recent quality audit notes to identify the root cause before next month's cycle.`);
    }
  });
  if(allDates.length>0&&csChalMo>0){
    const totalShiftEntries=allDates.length*3;
    const pctFlagged=Math.round(csChalMo/totalShiftEntries*100);
    if(pctFlagged<=15) cs.push(win(`Only <strong>${csChalMo}</strong> of roughly ${totalShiftEntries} shift entries flagged an unusual situation — a largely smooth operating month.`));
    else cs.push(warn(`<strong>${csChalMo}</strong> shift entries flagged an unusual situation (~${pctFlagged}% of shifts) — worth a closer look at recurring themes.`));
  }

  // ── PayPal win rate ──
  if(mpd.total>0){
    if(mpd.winRate!=null&&mpd.winRate>=50){
      pp.push(win(`Dispute win rate finished at <strong>${mpd.winRate}%</strong> (${mpd.won} won of ${mpd.closed} closed) — above the 50% break-even line.`));
    } else if(mpd.winRate!=null){
      pp.push(warn(`Dispute win rate was <strong>${mpd.winRate}%</strong> (${mpd.won} won of ${mpd.closed} closed) — below the 50% break-even line.`));
      suggestions.push('Review the evidence/documentation process for lost disputes (PP) — the "By Dispute Reason" table below shows the most common loss driver to target first.');
    }
    if(mpd.ongoing>0){
      const pendPct=Math.round(mpd.ongoing/mpd.total*100);
      if(pendPct>=30) pp.push(warn(`<strong>${mpd.ongoing}</strong> disputes (${pendPct}% of the month's total) are still open and unresolved.`));
    }
  }
  if(monthWeeks.length>=2){
    const firstWk=monthWeeks[0],lastWk=monthWeeks[monthWeeks.length-1];
    const wp1=aggPP(firstWk.dates),wp2=aggPP(lastWk.dates);
    if(wp1.totClosed>0&&wp2.totClosed>0){
      if(wp2.winRate>wp1.winRate+5) pp.push(win(`Win rate trended up during the month — from <strong>${wp1.winRate}%</strong> in the first week to <strong>${wp2.winRate}%</strong> in the last.`));
      else if(wp2.winRate<wp1.winRate-5) pp.push(warn(`Win rate slipped over the month — from <strong>${wp1.winRate}%</strong> in the first week to <strong>${wp2.winRate}%</strong> in the last.`));
    }
  }

  // ── Supply chain backlog ──
  if(sc.totNew>0){
    const closeRate=Math.round(sc.closed/sc.totNew*100);
    if(sc.pending>100){
      scB.push(warn(`Carrying <strong>${sc.pending}</strong> pending cases at month end — a growing backlog risk.`));
      suggestions.push('Dedicate focused time to clearing the oldest pending supply chain cases (SC) before the backlog compounds into next month.');
    } else if(closeRate>=80){
      scB.push(win(`Closed <strong>${sc.closed}</strong> of <strong>${sc.totNew}</strong> new cases (${closeRate}%), keeping the pending queue under control.`));
    }
    if(sc.damD>sc.damA&&sc.damD>0){
      scB.push(warn(`Damage claim denials (<strong>${sc.damD}</strong>) outnumbered approvals (<strong>${sc.damA}</strong>).`));
      suggestions.push('Review damage claim assessment criteria (SC) for consistency, and consider a second-review step for borderline denials.');
    }
  }
  if(monthWeeks.length>=2){
    const firstWk=monthWeeks[0],lastWk=monthWeeks[monthWeeks.length-1];
    const ws1=aggSC(firstWk.dates),ws2=aggSC(lastWk.dates);
    if(ws2.pending>ws1.pending+20) scB.push(warn(`Pending cases climbed over the month — from <strong>${ws1.pending}</strong> to <strong>${ws2.pending}</strong>.`));
  }

  // ── Refunds / cancellations ──
  if(moTotalRef>0){
    fin.push(warn(`Total refunds reached <strong>€${moTotalRef.toFixed(2)}</strong>${moCancel>0?`, alongside <strong>${moCancel}</strong> 24-hour cancellation${moCancel!==1?'s':''}`:''}.`));
    suggestions.push('Cross-check the top refund/cancellation reasons against product or fulfillment issues to see if any are addressable at the source.');
  } else {
    fin.push(win('No refund activity recorded for the month.'));
  }

  if(!cs.length) cs.push('No CS data available for this period yet.');
  if(!pp.length) pp.push('No PayPal dispute activity recorded this period.');
  if(!scB.length) scB.push('No supply chain data available for this period yet.');
  if(!suggestions.length) suggestions.push('Maintain current processes — no specific action items identified from this month’s data.');

  const csChips=[kingM?statChip(kingM.avgQ!=null?kingM.avgQ+'%':'—','King Quality','#2563eb'):null,patM?statChip(patM.avgQ!=null?patM.avgQ+'%':'—','Patrick Quality','#2563eb'):null,gabM?statChip(gabM.avgQ!=null?gabM.avgQ+'%':'—','Gabby Quality','#2563eb'):null];
  const ppChips=[statChip(mpd.total||'—','Total Disputes','#7c3aed'),mpd.winRate!=null?statChip(mpd.winRate+'%','Win Rate',mpd.winRate>=50?'#15803d':'#dc2626'):null,statChip(mpd.ongoing||'—','Ongoing','#7c3aed')];
  const scChips=[statChip(sc.totNew||'—','New Cases','#059669'),statChip(sc.closed||'—','Closed','#059669'),statChip(sc.pending||'—','Pending',sc.pending>100?'#dc2626':'#059669')];
  const finChips=[statChip(moTotalRef>0?'€'+moTotalRef.toFixed(2):'—','Total Refunds','#dc2626'),statChip(moCancel||'—','Cancellations','#dc2626')];

  const suggBlock=`<ul style="margin:0;padding:0 0 0 1.1rem;list-style:disc;display:flex;flex-direction:column;gap:.4rem">
    ${suggestions.map(t=>`<li style="font-size:.83rem;line-height:1.7;color:#334155">${t}</li>`).join('')}
  </ul>`;

  return `
  <div style="background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.25rem;box-shadow:var(--shadow-sm)">
    <div style="display:flex;align-items:center;justify-content:space-between;padding-bottom:.75rem;border-bottom:2px solid #f1f5f9;margin-bottom:1.25rem">
      <div>
        <div style="font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted)">Monthly Insights — by Team</div>
        <div style="font-size:.92rem;font-weight:700;color:#1e293b;margin-top:.15rem">${month.label}</div>
      </div>
      <div style="font-size:.75rem;color:var(--muted)">${allDates.length} operating day${allDates.length!==1?'s':''}</div>
    </div>
    ${deptGrid([
      deptInsightCard('var(--cs)','📧','Customer Service','King · Patrick · Gabby',csChips,cs),
      deptInsightCard('var(--pp)','⚖️','PayPal Disputes','Maria — Dispute Manager',ppChips,pp),
      deptInsightCard('var(--sc)','📦','Supply Chain','Veronica — Supply Chain Manager',scChips,scB),
      deptInsightCard('#dc2626','💳','Financial Activity','',finChips,fin),
    ])}
    <div style="border:1px solid #fde68a;background:#fffbeb;border-radius:10px;padding:.9rem 1rem;margin-top:.75rem">
      <div style="font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#b45309;margin-bottom:.55rem">💡 Suggested Improvements for Next Month</div>
      ${suggBlock}
    </div>
  </div>`;
}

function renderMonthly(moKey,cmpMoKey){
  if(cmpMoKey&&cmpMoKey!==moKey){
    const m1=MONTHS.find(m=>m.key===moKey),m2=MONTHS.find(m=>m.key===cmpMoKey);
    if(m1&&m2){document.getElementById('dash').innerHTML=renderMonthlyComparison(m1,m2);return;}
  }
  const month=MONTHS.find(m=>m.key===moKey);
  if(!month){document.getElementById('dash').innerHTML='<div class="no-data">No data for this month.</div>';return;}

  const allDates=month.dates.slice().sort(sortDK);
  const wm=new Map();
  allDates.forEach(dk=>{const{monKey,label}=weekBounds(dk);if(!wm.has(monKey))wm.set(monKey,{key:monKey,label,dates:[]});wm.get(monKey).dates.push(dk);});
  const monthWeeks=[...wm.values()].sort((a,b)=>sortDK(a.key,b.key));

  // ── Aggregates ──────────────────────────────────────────────────
  const pp=aggPP(allDates), sc=aggSC(allDates);
  const ppWin=pp.inqWin+pp.claimWin, ppLoss=pp.inqLost+pp.claimLost;
  const _moYear=parseInt((month.label||'').match(/\d{4}/)?.[0])||null;
  const mpd=calcPPDisputes(allDates,_moYear); // authoritative win/loss — year-filtered

  // CS hours + emails
  const moHoursRows=DB.hours.filter(r=>allDates.some(dk=>anyDateKey(r[0])===dk||dateKey(r[0])===dk));
  const moEmails=moHoursRows.reduce((s,r)=>s+(parseFloat((r[2]||'').replace(/,/g,''))||0),0);
  const moHours=moHoursRows.reduce((s,r)=>s+(parseFloat((r[1]||'').replace(/,/g,''))||0),0);

  // CS scorecard monthly (per rep)
  const moRepScore=(repName)=>{
    const lo=repName.toLowerCase();
    let emails=0,target=0,hours=0,qualVals=[];
    DB.score.forEach(r=>{
      if(!(r[SCORE_COLS.name]||'').toLowerCase().includes(lo)) return;
      const rdk=scoreDateKey(r[SCORE_COLS.date]);if(!rdk) return;
      if(!allDates.includes(rdk)) return;
      const getv=c=>{if(c===undefined||c<0)return null;const v=(r[c]||'').trim();return(v===''||v.startsWith('#'))?null:v;};
      const e=getv(SCORE_COLS.emails),t=getv(SCORE_COLS.target),h=getv(SCORE_COLS.hours),q=getv(SCORE_COLS.quality);
      if(e===null&&h===null) return;
      if(e!==null) emails+=parseFloat(e)||0;
      if(t!==null) target+=parseFloat(t)||0;
      if(h!==null) hours+=parseFloat(h)||0;
      if(q!==null) qualVals.push(parseFloat(q));
    });
    if(!emails&&!hours) return null;
    return{emails,target,hours:+hours.toFixed(1),pct:target>0?+((emails/target)*100).toFixed(1):null,avgQ:qualVals.length?+(qualVals.reduce((a,b)=>a+b,0)/qualVals.length).toFixed(2):null};
  };
  const kingM=moRepScore('King'),patM=moRepScore('Patrick'),gabM=moRepScore('Gabby');
  const mariaM=moRepScore('Maria');

  // CS challenges / actions month totals
  const allCsRowsMo=allDates.flatMap(dk=>DB.cs.filter(r=>dateKey(r[0])===dk||anyDateKey(r[0])===dk));
  const csChalMo=allCsRowsMo.filter(r=>!isNone(r[2])&&!isOff(r[2])&&(r[2]||'').trim()).length;

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function renderDailyComparison(dk1,dk2){
  const pm1=ppMain(dk1),pm2=ppMain(dk2);
  const sc1=scMain(dk1),sc2=scMain(dk2);
  const h1=DB.hours.filter(r=>anyDateKey(r[0])===dk1||dateKey(r[0])===dk1);
  const h2=DB.hours.filter(r=>anyDateKey(r[0])===dk2||dateKey(r[0])===dk2);
  const csE1=h1.reduce((s,r)=>s+(parseFloat((r[2]||'').replace(/,/g,''))||0),0);
  const csE2=h2.reduce((s,r)=>s+(parseFloat((r[2]||'').replace(/,/g,''))||0),0);
  const csH1=h1.reduce((s,r)=>s+(parseFloat((r[1]||'').replace(/,/g,''))||0),0);
  const csH2=h2.reduce((s,r)=>s+(parseFloat((r[1]||'').replace(/,/g,''))||0),0);
  const king1=getRepScore(dk1,'King'),king2=getRepScore(dk2,'King');
  const pat1=getRepScore(dk1,'Patrick'),pat2=getRepScore(dk2,'Patrick');
  const gab1=getRepScore(dk1,'Gabby'),gab2=getRepScore(dk2,'Gabby');
  const mar1=getRepScore(dk1,'Maria'),mar2=getRepScore(dk2,'Maria');
  const ver1=getRepScore(dk1,'Veronica'),ver2=getRepScore(dk2,'Veronica');

  const delta=(a,b,higher='good')=>{
    const na=parseFloat(String(a).replace(/[%,]/g,'')),nb=parseFloat(String(b).replace(/[%,]/g,''));
    if(isNaN(na)||isNaN(nb)) return '';
    const d=na-nb;
    if(Math.abs(d)<0.01) return '<span style="color:var(--muted);font-size:.7rem">→</span>';
    const good=(higher==='good'&&d>0)||(higher==='bad'&&d<0);
    return `<span style="color:${good?'var(--win)':'var(--los)'};font-size:.7rem;font-weight:700">${d>0?'▲':'▼'}${Math.abs(d).toFixed(d%1===0?0:1)}</span>`;
  };

  const row=(label,v1,v2,higher='good')=>`
    <tr>
      <td class="mn">${label}</td>
      <td class="nc">${v1??'—'}</td>
      <td class="nc">${v2??'—'}</td>
      <td class="nc">${delta(v1,v2,higher)}</td>
    </tr>`;
  const thead=`<tr><th style="min-width:160px">Metric</th><th class="dh"><span class="dn">${dk2short(dk1)}</span></th><th class="dh"><span class="dn">${dk2short(dk2)}</span></th><th class="dh">Δ Delta</th></tr>`;

  const repRows=(r1,r2,name)=>`
    <tr class="sr"><td colspan="4">${name}</td></tr>
    ${row('📧 Emails',r1?.emails,r2?.emails)}
    ${row('🎯 Target',r1?.target,r2?.target)}
    ${row('📊 % Hit',r1?.pct,r2?.pct)}
    ${row('⏱️ Hours',r1?.hours,r2?.hours)}
    ${row('⭐ Quality',r1?.quality,r2?.quality)}`;

  return `
    <div style="background:#f5f3ff;border:1px solid #c4b5fd;border-radius:8px;padding:.75rem 1rem;margin-bottom:1rem;display:flex;align-items:center;gap:.75rem">
      <span style="font-size:1rem">⇌</span>
      <span style="font-size:.8rem;font-weight:700;color:#4c1d95">Comparing <strong>${dk2full(dk1)}</strong> vs <strong>${dk2full(dk2)}</strong></span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:1rem">

      <!-- CS Comparison -->
      <div>
        <div style="font-size:.7rem;font-weight:700;color:var(--cs-dark);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.5rem;padding:.35rem .75rem;background:var(--cs-light);border-left:3px solid var(--cs);border-radius:4px">👥 Customer Service</div>
        <div class="tbl-wrap"><table class="ctbl">
          <thead>${thead}</thead>
          <tbody>
            ${row('📧 Total CS Emails',csE1||'—',csE2||'—')}
            ${row('⏱️ Total CS Hours',csH1?csH1.toFixed(1):'—',csH2?csH2.toFixed(1):'—')}
            ${repRows(king1,king2,'👑 King')}
            ${repRows(pat1,pat2,'⭐ Patrick')}
            ${repRows(gab1,gab2,'💫 Gabby')}
          </tbody>
        </table></div>
      </div>

      <!-- PP & SC Comparison -->
      <div>
        <div style="font-size:.7rem;font-weight:700;color:var(--pp-dark);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.5rem;padding:.35rem .75rem;background:var(--pp-light);border-left:3px solid var(--pp);border-radius:4px">⚖️ PayPal Disputes — Maria</div>
        <div class="tbl-wrap" style="margin-bottom:1rem"><table class="ctbl">
          <thead>${thead}</thead>
          <tbody>
            ${row('📁 Total New',pm1?n(pm1[8]):'—',pm2?n(pm2[8]):'—','bad')}
            ${row('✅ Total Closed',pm1?n(pm1[13]):'—',pm2?n(pm2[13]):'—')}
            ${row('📈 Win Rate',pm1&&n(pm1[13])>0?Math.round((n(pm1[9])+n(pm1[10]))/n(pm1[13])*100)+'%':'—',pm2&&n(pm2[13])>0?Math.round((n(pm2[9])+n(pm2[10]))/n(pm2[13])*100)+'%':'—')}
            ${repRows(mar1,mar2,'Maria')}
          </tbody>
        </table></div>

        <div style="font-size:.7rem;font-weight:700;color:var(--sc-dark);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.5rem;padding:.35rem .75rem;background:var(--sc-light);border-left:3px solid var(--sc);border-radius:4px">📦 Supply Chain — Veronica</div>
        <div class="tbl-wrap"><table class="ctbl">
          <thead>${thead}</thead>
          <tbody>
            ${row('🔢 New Cases',sc1?n(sc1[7]):'—',sc2?n(sc2[7]):'—','bad')}
            ${row('✅ Closed',sc1?n(sc1[8]):'—',sc2?n(sc2[8]):'—')}
            ${row('⏳ Pending',sc1?n(sc1[9]):'—',sc2?n(sc2[9]):'—','bad')}
            ${repRows(ver1,ver2,'Veronica')}
          </tbody>
        </table></div>
      </div>
    </div>`;
}

function renderMonthlyComparison(m1,m2){
  const pp1=aggPP(m1.dates),pp2=aggPP(m2.dates);
  const sc1=aggSC(m1.dates),sc2=aggSC(m2.dates);
  const delta=(a,b,higher='good')=>{const d=a-b;if(!isFinite(d)||d===0)return'';const good=(higher==='good'&&d>0)||(higher==='bad'&&d<0);return`<span style="color:${good?'var(--win)':'var(--los)'};font-size:.65rem;font-weight:700;margin-left:.3rem">${d>0?'▲':'▼'}${Math.abs(d)}</span>`;};
  const tdC=(v1,v2,cls='',higher='good')=>`<td class="nc ${cls}">${v1||'–'}</td><td class="nc ${cls}">${v2||'–'}</td><td class="nc" style="font-size:.75rem">${delta(+v1||0,+v2||0,higher)}</td>`;
  const rowH=`<tr><th style="min-width:190px">Metric</th><th class="dh">${m1.label}</th><th class="dh">${m2.label}</th><th class="dh">Δ</th></tr>`;
  return `
    <div style="background:#f5f3ff;border:1px solid #c4b5fd;border-radius:8px;padding:.75rem 1rem;margin-bottom:1rem">
      ⇌ <strong style="color:#4c1d95">${m1.label}</strong> vs <strong style="color:#4c1d95">${m2.label}</strong>
    </div>
    <div class="section"><div class="sh pp-s"><div class="sh-icon pp-s">⚖️</div><div class="sh-ttl">PayPal Disputes — Month vs Month</div></div>
    <div class="tbl-wrap"><table class="ctbl"><thead>${rowH}</thead><tbody>
      <tr><td class="mn">Total New</td>${tdC(pp1.totNew,pp2.totNew,'','bad')}</tr>
      <tr><td class="mn">Total Closed</td>${tdC(pp1.totClosed,pp2.totClosed)}</tr>
